<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Le Podium — Joueurs</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:#06060d;color:#f0f0f5;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

#loading-overlay{position:fixed;inset:0;background:#06060d;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(244,114,182,0.2);border-top-color:#f472b6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e2e;border:1px solid rgba(255,255,255,0.12);color:#f0f0f5;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── HEADER ── */
.header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em;color:#f0f0f5}
.logo span{color:#f472b6}

/* ── VIEWS ── */
.view{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.view.active{display:flex}

/* ── JOIN STEP CODE ── */
.join-box{width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px}
.join-title{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;font-style:italic;text-transform:uppercase;text-align:center;letter-spacing:.04em}
.join-title span{color:#f472b6}
.join-input{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;padding:16px 20px;font-size:24px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:#f0f0f5;font-family:'Exo 2',sans-serif;width:100%;outline:none;text-align:center;transition:border-color .2s}
.join-input:focus{border-color:rgba(244,114,182,0.5)}
.join-error{color:#f87171;font-size:13px;text-align:center;display:none}
.btn-main{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;border-radius:14px;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:#f472b6;color:#fff;font-family:'DM Sans',sans-serif;transition:filter .2s,transform .15s}
.btn-main:hover{filter:brightness(1.1)}
.btn-main:active{transform:scale(.97)}
.btn-ghost{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}

/* ── JOIN STEP TEAM ── */
.teams-title{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:4px}
.teams-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px}
.team-btn{display:flex;align-items:center;justify-content:center;padding:18px 20px;border-radius:14px;font-size:17px;font-weight:700;font-family:'Exo 2',sans-serif;font-style:italic;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#f0f0f5;transition:all .2s}
.team-btn:hover{border-color:rgba(244,114,182,0.5);background:rgba(244,114,182,0.08);color:#f472b6}

/* ── GAME VIEW ── */
#view-game{padding:0;align-items:stretch;justify-content:flex-start;overflow:hidden}
.game-header{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-team-badge{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;color:#f472b6;text-transform:uppercase;letter-spacing:.06em}
.game-score{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic}
.game-question{padding:16px 20px 8px;text-align:center;font-size:16px;font-weight:600;color:#f0f0f5;flex-shrink:0}
.game-timer{text-align:center;font-family:'Exo 2',sans-serif;font-size:42px;font-weight:800;font-style:italic;padding:4px 0;flex-shrink:0;transition:color .3s}
.game-timer.ok{color:#4fce8f}.game-timer.warn{color:#fb923c}.game-timer.urgent{color:#f87171;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.drag-hint{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;padding:4px 0;flex-shrink:0}
.drag-area{flex:1;display:flex;flex-direction:column;gap:10px;padding:10px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}

.drag-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:grab;user-select:none;transition:transform .15s,border-color .15s,background .15s;touch-action:none}
.drag-card:active{cursor:grabbing}
.drag-card.dragging{opacity:.5;transform:scale(.98)}
.drag-card.drag-over{border-color:#f472b6;background:rgba(244,114,182,0.1);transform:scale(1.02)}
.drag-rank{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;color:rgba(244,114,182,0.5);width:28px;flex-shrink:0;text-align:center}
.drag-card img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.drag-card-name{flex:1;font-size:15px;font-weight:600;color:#f0f0f5}
.drag-handle{color:rgba(255,255,255,0.2);font-size:20px;flex-shrink:0}

.submit-bar{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);position:sticky;bottom:0;background:#06060d;z-index:10}
.submitted-msg{text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:14px;font-style:italic}

/* ── WAITING ── */
.waiting-box{display:flex;flex-direction:column;align-items:center;gap:16px;color:rgba(255,255,255,0.3);text-align:center}
.waiting-box svg{opacity:.3}
.waiting-title{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}
.waiting-sub{font-size:13px}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div style="font-size:13px;color:rgba(255,255,255,0.3)">Chargement…</div></div>
<div id="toast"></div>

<div class="header">
  <div class="logo">Le <span>Podium</span></div>
</div>

<!-- ══ CODE ══ -->
<div class="view active" id="view-code">
  <div class="join-box">
    <div class="join-title">Rejoindre <span>une partie</span></div>
    <input class="join-input" id="join-code" maxlength="4" placeholder="ABCD" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')lookupSession()">
    <div class="join-error" id="join-error">Code invalide ou partie introuvable</div>
    <button class="btn-main" onclick="lookupSession()">Continuer →</button>
  </div>
</div>

<!-- ══ TEAM PICK ══ -->
<div class="view" id="view-team-pick">
  <div class="teams-title">Choisissez votre équipe</div>
  <div class="teams-list" id="teams-list"></div>
  <button class="btn-main btn-ghost" onclick="showView('code')" style="max-width:380px;margin-top:12px">← Retour</button>
</div>

<!-- ══ WAITING ── -->
<div class="view" id="view-waiting">
  <div class="waiting-box">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <div class="waiting-title" id="waiting-team-name">Équipe</div>
    <div class="waiting-sub">En attente du maître du jeu…</div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="view" id="view-game">
  <div class="game-header">
    <div class="game-team-badge" id="game-team-name">—</div>
    <div class="game-score" id="game-score">0 pts</div>
  </div>
  <div class="game-question" id="game-question">—</div>
  <div class="game-timer ok" id="game-timer" style="display:none">—</div>
  <div class="drag-hint">Glissez les cartes pour les classer</div>
  <div class="drag-area" id="drag-area"></div>
  <div class="submit-bar" id="submit-bar">
    <button class="btn-main" onclick="submitAnswer()">Valider mon classement →</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://tsneytqibltnjarajcll.supabase.co';
const SUPABASE_KEY='sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

let questions=[], teamName='', teamSessionId=null, teamScore=0;
let teamDragOrder=[], currentItems=[];
let sessionSub=null, timerInterval=null, timerVal=0, teamTimerStarted=false;
let sessionData=null;

async function init(){
  const {data}=await db.from('podium_questions').select('*, podium_items(*)').order('sort_order');
  questions=(data||[]).map(q=>({...q,podium_items:(q.podium_items||[]).sort((a,b)=>a.correct_rank-b.correct_rank)}));
  document.getElementById('loading-overlay').classList.add('hidden');
  // Auto-fill code from URL
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  if(code){
    document.getElementById('join-code').value=code.toUpperCase();
    await lookupSession();
  }
}

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
}

async function lookupSession(){
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){showToast('Entre un code');return;}
  const {data,error}=await db.from('podium_sessions').select('*').eq('code',code).single();
  if(error||!data){document.getElementById('join-error').style.display='block';return;}
  document.getElementById('join-error').style.display='none';
  sessionData=data;
  const teams=data.teams||[];
  document.getElementById('teams-list').innerHTML=teams.map(t=>`
    <button class="team-btn" onclick="pickTeam('${t.name.replace(/'/g,"\\'")}')">
      ${t.name}
    </button>`).join('');
  showView('team-pick');
}

function pickTeam(name){
  if(!sessionData)return;
  teamName=name;
  teamSessionId=sessionData.id;
  teamScore=(sessionData.teams||[]).find(t=>t.name===name)?.score||0;
  document.getElementById('game-team-name').textContent=name;
  document.getElementById('waiting-team-name').textContent=name;
  document.getElementById('game-score').textContent=teamScore+' pts';
  subscribeAsTeam(sessionData);
  showView('waiting');
}

function subscribeAsTeam(sess){
  applySessionToTeam(sess);
  // Realtime
  if(sessionSub)sessionSub.unsubscribe();
  sessionSub=db.channel('podium-player-'+teamSessionId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'podium_sessions',filter:'id=eq.'+teamSessionId},
      p=>applySessionToTeam(p.new))
    .subscribe();
  // Polling fallback every 2s
  if(window._pollInterval)clearInterval(window._pollInterval);
  window._pollInterval=setInterval(async()=>{
    const {data}=await db.from('podium_sessions').select('*').eq('id',teamSessionId).single();
    if(data)applySessionToTeam(data);
  },2000);
}

let lastQuestionId=null;
let cardsBuilt=false;

function applySessionToTeam(sess){
  const myTeam=(sess.teams||[]).find(t=>t.name===teamName);
  if(myTeam){
    teamScore=myTeam.score||0;
    document.getElementById('game-score').textContent=teamScore+' pts';
  }

  if(sess.current_question_id){
    const qChanged=String(sess.current_question_id)!==String(lastQuestionId);
    const q=questions.find(x=>String(x.id)===String(sess.current_question_id));

    if(q){
      document.getElementById('game-question').textContent=q.question;
      currentItems=q.podium_items||[];

      if(qChanged){
        // New question — reset and rebuild cards
        lastQuestionId=sess.current_question_id;
        cardsBuilt=false;
        teamTimerStarted=false;
      }

      if(!cardsBuilt && !myTeam?.submitted){
        buildDragCards(q.podium_items||[]);
        cardsBuilt=true;
        showView('game');
      } else if(myTeam?.submitted && !cardsBuilt){
        showSubmitted();
        cardsBuilt=true;
        showView('game');
      } else if(cardsBuilt){
        // Just update view if needed, don't rebuild cards
        showView('game');
      }
    } else {
      db.from('podium_questions').select('*, podium_items(*)').order('sort_order').then(({data})=>{
        if(data){
          questions=data.map(q=>({...q,podium_items:(q.podium_items||[]).sort((a,b)=>a.correct_rank-b.correct_rank)}));
          applySessionToTeam(sess);
        }
      });
    }
  }

  // Timer
  const timerEl=document.getElementById('game-timer');
  if(sess.status==='playing'){
    timerEl.style.display='block';
    startTeamTimer(sess.timer_duration||60);
  } else {
    timerEl.style.display='none';
    clearInterval(timerInterval);
    teamTimerStarted=false;
  }
}

function startTeamTimer(duration){
  if(teamTimerStarted)return;
  teamTimerStarted=true;
  timerVal=duration;
  const el=document.getElementById('game-timer');
  clearInterval(timerInterval);
  el.textContent=timerVal;
  el.className='game-timer ok';
  timerInterval=setInterval(()=>{
    timerVal--;
    el.textContent=timerVal;
    el.className='game-timer '+(timerVal>duration*.5?'ok':timerVal>10?'warn':'urgent');
    if(timerVal<=0){
      clearInterval(timerInterval);
      teamTimerStarted=false;
      el.style.display='none';
    }
  },1000);
}

// ── DRAG & DROP ──
function buildDragCards(items){
  const shuffled=[...items].sort(()=>Math.random()-.5);
  teamDragOrder=shuffled.map(i=>i.id);
  const area=document.getElementById('drag-area');
  area.innerHTML=shuffled.map((item,i)=>`
    <div class="drag-card" id="dc-${item.id}" draggable="true"
      ondragstart="dragStart(event,'${item.id}')"
      ondragover="dragOver(event)"
      ondrop="dragDrop(event,'${item.id}')"
      ondragend="dragEnd(event)"
      ontouchstart="touchStart(event,'${item.id}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event,'${item.id}')">
      <div class="drag-rank" id="dr-${item.id}">${i+1}</div>
      ${item.image_url?`<img src="${item.image_url}" alt="">`:''}
      <div class="drag-card-name">${item.name||''}</div>
      <div class="drag-handle">⠿</div>
    </div>`).join('');
  document.getElementById('submit-bar').innerHTML='<button class="btn-main" id="btn-ready" onclick="markReady()">Je suis prêt ✓</button>';
}

function showSubmitted(){
  document.getElementById('submit-bar').innerHTML='<div class="submitted-msg">✓ Prêt ! En attente des autres équipes…</div>';
  // Gray out cards
  document.querySelectorAll('.drag-card').forEach(c=>{c.style.opacity='0.5';c.draggable=false;});
}

let dragSrc=null;
function dragStart(e,id){dragSrc=id;e.currentTarget.classList.add('dragging');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('drag-over'));}
function dragOver(e){e.preventDefault();document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function dragDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('drag-over'));
  if(!dragSrc||dragSrc===targetId)return;
  swapCards(dragSrc,targetId);
  dragSrc=null;
}

let touchDragId=null,touchClone=null;
function touchStart(e,id){
  touchDragId=id;
  const card=document.getElementById('dc-'+id);
  const rect=card.getBoundingClientRect();
  touchClone=card.cloneNode(true);
  touchClone.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.8;z-index:1000;pointer-events:none;transition:none`;
  document.body.appendChild(touchClone);
  card.style.opacity='0.3';
}
function touchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const t=e.touches[0];
  touchClone.style.top=(t.clientY-30)+'px';
  touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
  // highlight target
  document.querySelectorAll('.drag-card').forEach(card=>{
    const r=card.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)
      card.classList.add('drag-over');
    else card.classList.remove('drag-over');
  });
}
function touchEnd(e,id){
  if(!touchClone)return;
  const t=e.changedTouches[0];
  document.querySelectorAll('.drag-card').forEach(card=>{
    const rect=card.getBoundingClientRect();
    if(t.clientX>=rect.left&&t.clientX<=rect.right&&t.clientY>=rect.top&&t.clientY<=rect.bottom){
      const targetId=card.id.replace('dc-','');
      if(targetId!==touchDragId)swapCards(touchDragId,targetId);
    }
    card.classList.remove('drag-over');
  });
  touchClone.remove();touchClone=null;
  const src=document.getElementById('dc-'+touchDragId);
  if(src)src.style.opacity='1';
  touchDragId=null;
}

function swapCards(id1,id2){
  const area=document.getElementById('drag-area');
  const el1=document.getElementById('dc-'+id1);
  const el2=document.getElementById('dc-'+id2);
  if(!el1||!el2)return;
  const cards=[...area.children];
  const idx1=cards.indexOf(el1);
  const idx2=cards.indexOf(el2);
  if(idx1<idx2)el2.parentNode.insertBefore(el1,el2.nextSibling);
  else el1.parentNode.insertBefore(el2,el1.nextSibling);
  [...area.children].forEach((card,i)=>{
    const rid=card.id.replace('dc-','');
    const rankEl=document.getElementById('dr-'+rid);
    if(rankEl)rankEl.textContent=i+1;
  });
  teamDragOrder=[...area.children].map(c=>parseInt(c.id.replace('dc-','')));
  autoSave();
}

let autoSaveTimeout=null;
async function autoSave(){
  clearTimeout(autoSaveTimeout);
  autoSaveTimeout=setTimeout(async()=>{
    if(!teamDragOrder.length||!teamSessionId)return;
    const qId=currentItems[0]?.question_id||null;
    // Upsert answer
    await db.from('podium_answers').upsert({
      session_id:teamSessionId,question_id:qId,team_name:teamName,rankings:teamDragOrder
    },{onConflict:'session_id,question_id,team_name'});
  },500);
}

async function submitAnswer(){
  if(!teamDragOrder.length){showToast('Classez les cartes d\'abord');return;}
  const qId=currentItems[0]?.question_id||null;
  const {error}=await db.from('podium_answers').insert({
    session_id:teamSessionId,question_id:qId,team_name:teamName,rankings:teamDragOrder
  });
  if(error){showToast('Erreur : '+error.message);return;}
  const {data:sess}=await db.from('podium_sessions').select('teams').eq('id',teamSessionId).single();
  const teams=(sess?.teams||[]).map(t=>t.name===teamName?{...t,submitted:true}:t);
  await db.from('podium_sessions').update({teams}).eq('id',teamSessionId);
  showSubmitted();
  showToast('Classement envoyé ✓');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
</body>
</html>
