<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Le Podium — Joueurs</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.hidden{display:none}
.header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em}
.logo span{color:var(--podium)}
.view{display:none;flex-direction:column;flex:1;padding:24px 20px}
.view.active{display:flex}

/* CODE */
#v-code{align-items:center;justify-content:center;gap:20px}
.join-box{width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
.join-title{font-family:'Exo 2',sans-serif;font-size:24px;font-weight:800;font-style:italic;text-transform:uppercase;text-align:center;letter-spacing:.04em}
.join-title span{color:var(--podium)}
.code-input{background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:14px;padding:16px;font-size:28px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--text);font-family:'Exo 2',sans-serif;width:100%;outline:none;text-align:center;transition:border-color .2s}
.code-input:focus{border-color:var(--podium)}
.err{color:#f87171;font-size:13px;text-align:center;display:none}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:15px;border-radius:14px;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:filter .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-podium{background:var(--podium);color:#fff}
.btn-podium:hover{filter:brightness(1.1)}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid var(--border2)}

/* TEAM */
#v-team{align-items:center;justify-content:center;gap:16px}
.teams-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.team-btn{display:flex;align-items:center;justify-content:center;padding:18px;border-radius:14px;font-size:17px;font-weight:700;font-family:'Exo 2',sans-serif;font-style:italic;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:1.5px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text);transition:all .2s;width:100%}
.team-btn:hover{border-color:var(--podium);background:var(--podium-bg);color:var(--podium)}

/* WAITING */
#v-waiting{align-items:center;justify-content:center;gap:16px;text-align:center}
.wait-team{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;text-transform:uppercase;color:var(--podium);letter-spacing:.06em}
.wait-msg{font-size:14px;color:rgba(255,255,255,.35)}

/* GAME */
#v-game{padding:0;gap:0}
.game-top{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-team{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;color:var(--podium);text-transform:uppercase;letter-spacing:.06em}
.game-score{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic}
.game-q{padding:14px 20px 6px;text-align:center;font-size:15px;font-weight:600;flex-shrink:0}
.game-timer{text-align:center;font-family:'Exo 2',sans-serif;font-size:48px;font-weight:800;font-style:italic;padding:4px 0;flex-shrink:0;transition:color .3s}
.game-timer.ok{color:#4fce8f}.game-timer.warn{color:#fb923c}.game-timer.urgent{color:#f87171;animation:aq-pulse .5s infinite}
.drag-hint{font-size:11px;color:rgba(255,255,255,.25);text-align:center;padding:4px 0;flex-shrink:0}
.drag-area{flex:1;display:flex;flex-direction:column;gap:10px;padding:10px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.drag-card{background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:grab;user-select:none;touch-action:none;transition:transform .15s,border-color .15s,background .15s}
.drag-card.drag-over{border-color:var(--podium);background:var(--podium-bg);transform:scale(1.02)}
.drag-card.dragging{opacity:.4;transform:scale(.97)}
.drag-rank{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;color:rgba(244,114,182,.5);width:28px;flex-shrink:0;text-align:center}
.drag-card img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.drag-card-name{flex:1;font-size:15px;font-weight:600}
.drag-handle{color:rgba(255,255,255,.2);font-size:20px;flex-shrink:0}
.submit-bar{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);position:sticky;bottom:0}
.submitted-msg{text-align:center;padding:16px;color:rgba(255,255,255,.4);font-size:14px;font-style:italic}

/* DONE */
#v-done{align-items:center;justify-content:center;gap:16px;text-align:center}
.done-icon{font-size:48px}
.done-title{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;text-transform:uppercase;color:#4fce8f}
.done-msg{font-size:14px;color:rgba(255,255,255,.35)}
</style>
</head>
<body>
<div id="loading"><div class="aq-spinner"></div><div style="font-size:13px;color:rgba(255,255,255,.3)">Chargement…</div></div>

<div class="header">
  <div class="logo">Le <span>Podium</span></div>
  <div id="header-team" style="font-size:13px;color:rgba(244,114,182,.6);font-weight:600"></div>
</div>

<div class="view" id="v-code">
  <div class="join-box">
    <div class="join-title">Rejoindre <span>une partie</span></div>
    <div id="copy-link-wrap" style="display:none;background:var(--podium-bg);border:1px solid var(--podium-border);border-radius:10px;padding:10px 14px;align-items:center;gap:10px">
      <div id="copy-link-text" style="flex:1;font-size:12px;color:var(--podium);font-family:monospace;word-break:break-all"></div>
      <button onclick="copyLink()" style="background:var(--podium-bg);border:1px solid var(--podium-border);color:var(--podium);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif">Copier</button>
    </div>
    <input class="code-input" id="inp-code" maxlength="4" placeholder="ABCD" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doLookup()">
    <div class="err" id="err-code">Code invalide</div>
    <button class="btn btn-podium" onclick="doLookup()">Continuer →</button>
  </div>
</div>

<div class="view" id="v-team">
  <div style="font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:4px">Choisissez votre équipe</div>
  <div class="teams-list" id="teams-list" style="margin:0 auto"></div>
  <button class="btn btn-ghost" onclick="goBack()" style="max-width:360px;margin:8px auto 0">← Retour</button>
</div>

<div class="view" id="v-waiting">
  <div class="wait-team" id="wait-team-name"></div>
  <div class="wait-msg">En attente du maître du jeu…</div>
</div>

<div class="view" id="v-game">
  <div class="game-top">
    <div class="game-team" id="g-team"></div>
    <div class="game-score" id="g-score">0 pts</div>
  </div>
  <div class="game-q" id="g-question"></div>
  <div class="game-timer ok" id="g-timer" style="display:none"></div>
  <div class="drag-hint">Glissez les cartes pour les classer</div>
  <div class="drag-area" id="drag-area"></div>
  <div class="submit-bar">
    <button class="btn btn-podium" id="btn-ready" onclick="markReady()">Je suis prêt ✓</button>
    <div class="submitted-msg" id="msg-submitted" style="display:none">✓ Classement envoyé ! En attente…</div>
  </div>
</div>

<div class="view" id="v-done">
  <div class="done-icon">🏆</div>
  <div class="done-title">Classement envoyé !</div>
  <div class="done-msg">En attente de la révélation…</div>
</div>

<script>
const DB_URL = 'https://tsneytqibltnjarajcll.supabase.co';
const DB_KEY = 'sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const { createClient } = supabase;
const db = createClient(DB_URL, DB_KEY);

let questions = [];
let sessData = null, myTeam = '', myCode = '';
let currentItems = [], teamDragOrder = [];
let lastQId = null, cardsBuilt = false, isReady = false;
let timerVal = 0, timerInterval = null, timerStarted = false;
let pollInterval = null;

async function init() {
  const [qRes, iRes] = await Promise.all([
    db.from('podium_questions').select('*').order('sort_order'),
    db.from('podium_items').select('*').order('correct_rank')
  ]);
  questions = (qRes.data||[]).map(q => ({
    ...q,
    podium_items: (iRes.data||[]).filter(i => i.question_id === q.id).sort((a,b) => a.correct_rank - b.correct_rank)
  }));
  document.getElementById('loading').classList.add('hidden');
  const p = new URLSearchParams(location.search);
  myCode = p.get('code')||'';
  myTeam = p.get('team')||'';
  if (myCode) {
    const url = `${location.origin}${location.pathname}?code=${myCode}`;
    document.getElementById('copy-link-text').textContent = url;
    document.getElementById('copy-link-wrap').style.display = 'flex';
  }
  if (myCode && myTeam) {
    document.getElementById('inp-code').value = myCode;
    const ok = await lookupCode(myCode);
    if (ok && sessData) { joinTeam(myTeam, false); return; }
  } else if (myCode) {
    document.getElementById('inp-code').value = myCode;
    const ok = await lookupCode(myCode);
    if (ok) showView('v-team'); else showView('v-code');
    return;
  }
  showView('v-code');
}

function showView(v) { document.querySelectorAll('.view').forEach(el=>el.classList.remove('active')); document.getElementById(v).classList.add('active'); }
function setURL() { const u=new URL(location.href); if(myCode)u.searchParams.set('code',myCode); if(myTeam)u.searchParams.set('team',myTeam); history.replaceState(null,'',u.toString()); }
function goBack() { myTeam=''; const u=new URL(location.href); u.searchParams.delete('team'); history.replaceState(null,'',u.toString()); showView('v-code'); }

async function doLookup() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!code) { toast('Entre un code'); return; }
  myCode = code;
  const ok = await lookupCode(code);
  if (ok) { setURL(); const url=`${location.origin}${location.pathname}?code=${myCode}`; document.getElementById('copy-link-text').textContent=url; document.getElementById('copy-link-wrap').style.display='flex'; showView('v-team'); }
}

async function lookupCode(code) {
  const { data, error } = await db.from('podium_sessions').select('*').eq('code', code).single();
  if (error||!data) { document.getElementById('err-code').style.display='block'; return false; }
  document.getElementById('err-code').style.display='none';
  sessData = data;
  const teams = data.teams||[];
  document.getElementById('teams-list').innerHTML = teams.map(t=>`<button class="team-btn" onclick="joinTeam('${t.name.replace(/'/g,"\\'")}',true)">${t.name}</button>`).join('');
  return true;
}

async function joinTeam(name, updateURL) {
  if (!sessData) return;
  myTeam = name;
  if (updateURL) setURL();
  document.getElementById('header-team').textContent = name;
  document.getElementById('wait-team-name').textContent = name;
  document.getElementById('g-team').textContent = name;
  const myT = (sessData.teams||[]).find(t=>t.name===name);
  document.getElementById('g-score').textContent = (myT?.score||0)+' pts';
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 2000);
  applySession(sessData);
}

async function poll() {
  if (!sessData) return;
  const { data } = await db.from('podium_sessions').select('*').eq('id', sessData.id).single();
  if (data) applySession(data);
}

function applySession(sess) {
  sessData = sess;
  const myT = (sess.teams||[]).find(t=>t.name===myTeam);
  document.getElementById('g-score').textContent = (myT?.score||0)+' pts';
  const qId = sess.current_question_id;
  if (String(qId) !== String(lastQId)) {
    lastQId = qId; cardsBuilt = false; isReady = false; timerStarted = false; clearInterval(timerInterval);
  }
  if (!qId) { showView('v-waiting'); return; }
  const q = questions.find(x=>String(x.id)===String(qId));
  if (!q) {
    db.from('podium_questions').select('*').order('sort_order').then(async ({data:qd}) => {
      const {data:id} = await db.from('podium_items').select('*').order('correct_rank');
      if(qd) { questions=qd.map(q=>({...q,podium_items:(id||[]).filter(i=>i.question_id===q.id).sort((a,b)=>a.correct_rank-b.correct_rank)})); applySession(sess); }
    });
    return;
  }
  document.getElementById('g-question').textContent = q.question;
  currentItems = q.podium_items||[];
  if (sess.status === 'playing') {
    if (!cardsBuilt) { buildDragCards(currentItems); cardsBuilt = true; }
    if (!timerStarted) startTimer(sess.timer_duration||90);
    if (!isReady) { showView('v-game'); document.getElementById('btn-ready').style.display='flex'; document.getElementById('msg-submitted').style.display='none'; }
  } else {
    showView('v-waiting');
    document.getElementById('wait-team-name').textContent = myTeam + ' — ' + q.question;
  }
}

function startTimer(duration) {
  if (timerStarted) return;
  timerStarted = true; timerVal = duration;
  const el = document.getElementById('g-timer');
  el.style.display = 'block'; el.textContent = timerVal; el.className = 'game-timer ok';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerVal--;
    el.textContent = timerVal;
    el.className = 'game-timer ' + (timerVal>duration*.5?'ok':timerVal>10?'warn':'urgent');
    if (timerVal <= 0) {
      clearInterval(timerInterval); el.style.display = 'none';
      if (!isReady) { document.getElementById('btn-ready').disabled=true; document.getElementById('btn-ready').style.opacity='.4'; toast('Temps écoulé !'); }
    }
  }, 1000);
}

function buildDragCards(items) {
  const shuffled = [...items].sort(()=>Math.random()-.5);
  teamDragOrder = shuffled.map(i=>i.id);
  document.getElementById('drag-area').innerHTML = shuffled.map((item,i)=>`
    <div class="drag-card" id="dc-${item.id}" draggable="true"
      ondragstart="dStart(event,'${item.id}')" ondragover="dOver(event)" ondrop="dDrop(event,'${item.id}')" ondragend="dEnd(event)"
      ontouchstart="tStart(event,'${item.id}')" ontouchmove="tMove(event)" ontouchend="tEnd(event,'${item.id}')">
      <div class="drag-rank" id="dr-${item.id}">${i+1}</div>
      ${item.image_url?`<img src="${item.image_url}" alt="">`:'' }
      <div class="drag-card-name">${item.name||''}</div>
      <div class="drag-handle">⠿</div>
    </div>`).join('');
}

let dragSrc = null;
function dStart(e,id){dragSrc=id;e.currentTarget.classList.add('dragging');}
function dEnd(e){document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('dragging','drag-over'));}
function dOver(e){e.preventDefault();document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function dDrop(e,tid){e.preventDefault();document.querySelectorAll('.drag-card').forEach(c=>c.classList.remove('drag-over','dragging'));if(!dragSrc||dragSrc===tid)return;swap(dragSrc,tid);dragSrc=null;}
let tId=null,tClone=null;
function tStart(e,id){tId=id;const c=document.getElementById('dc-'+id),r=c.getBoundingClientRect();tClone=c.cloneNode(true);tClone.style.cssText=`position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;opacity:.8;z-index:1000;pointer-events:none;transition:none`;document.body.appendChild(tClone);c.style.opacity='.3';}
function tMove(e){if(!tClone)return;e.preventDefault();const t=e.touches[0];tClone.style.top=(t.clientY-30)+'px';tClone.style.left=(t.clientX-tClone.offsetWidth/2)+'px';document.querySelectorAll('.drag-card').forEach(c=>{const r=c.getBoundingClientRect();c.classList.toggle('drag-over',t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);});}
function tEnd(e,id){if(!tClone)return;const t=e.changedTouches[0];document.querySelectorAll('.drag-card').forEach(c=>{const r=c.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){const tid=c.id.replace('dc-','');if(tid!==id)swap(id,tid);}c.classList.remove('drag-over');});tClone.remove();tClone=null;const s=document.getElementById('dc-'+id);if(s)s.style.opacity='1';tId=null;}
function swap(id1,id2){const area=document.getElementById('drag-area');const e1=document.getElementById('dc-'+id1),e2=document.getElementById('dc-'+id2);if(!e1||!e2)return;const cards=[...area.children];const i1=cards.indexOf(e1),i2=cards.indexOf(e2);if(i1<i2)e2.parentNode.insertBefore(e1,e2.nextSibling);else e1.parentNode.insertBefore(e2,e1.nextSibling);[...area.children].forEach((c,i)=>{const rid=c.id.replace('dc-','');const r=document.getElementById('dr-'+rid);if(r)r.textContent=i+1;});teamDragOrder=[...area.children].map(c=>parseInt(c.id.replace('dc-','')));}

async function markReady() {
  if (isReady||timerVal<=0) return;
  if (!teamDragOrder.length) { toast('Classez les cartes d\'abord'); return; }
  isReady = true;
  const qId = currentItems[0]?.question_id||null;
  const { error } = await db.from('podium_answers').upsert({ session_id:sessData.id, question_id:qId, team_name:myTeam, rankings:teamDragOrder }, { onConflict:'session_id,question_id,team_name' });
  if (error) { toast('Erreur : '+error.message); isReady=false; return; }
  const { data:s } = await db.from('podium_sessions').select('teams').eq('id', sessData.id).single();
  const teams = (s?.teams||[]).map(t=>t.name===myTeam?{...t,submitted:true}:t);
  await db.from('podium_sessions').update({ teams }).eq('id', sessData.id);
  showView('v-done'); toast('Prêt ✓');
}

function copyLink() {
  const url = document.getElementById('copy-link-text').textContent;
  navigator.clipboard.writeText(url).then(()=>toast('Lien copié ✓')).catch(()=>{
    const el=document.getElementById('copy-link-text');const range=document.createRange();range.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(range);toast('Sélectionné — copiez manuellement');
  });
}

function toast(msg) {
  let el = document.getElementById('aq-toast');
  if (!el) { el=document.createElement('div');el.id='aq-toast';document.body.appendChild(el); }
  el.textContent=msg;el.className='show';setTimeout(()=>el.className='',2000);
}

init();
</script>
</body>
</html>
