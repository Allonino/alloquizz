<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlloQuizz — Le Podium</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

/* SELECTOR */
.sel-wrap{padding:28px 36px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;max-width:860px;margin:0 auto;width:100%}
.sel-title{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}
.sel-title span{color:var(--podium)}
.sess-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:14px;transition:border-color .15s}
.sess-row:hover{border-color:var(--border2)}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sess-dot.waiting{background:var(--yellow)}
.sess-dot.playing{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,.6)}
.sess-dot.finished,.sess-dot.scores{background:var(--text3)}
.sess-info{flex:1;min-width:0}
.sess-name{font-size:13px;font-weight:600;color:var(--text)}
.sess-meta{font-size:11px;color:var(--text3);margin-top:2px}
.sess-code{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;color:var(--podium);letter-spacing:.1em;flex-shrink:0}

/* GAME */
.game-layout{display:grid;grid-template-columns:1fr 270px;flex:1;overflow:hidden}
.game-main{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.game-top{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.game-code-big{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:800;font-style:italic;letter-spacing:.12em;color:var(--podium)}
.copy-btn{background:var(--podium-bg);border:1px solid var(--podium-border);color:var(--podium);border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:filter .2s;font-family:'DM Sans',sans-serif}
.copy-btn:hover{filter:brightness(1.3)}
.game-q-area{flex:1;text-align:center}
.game-q-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px}
.game-q-txt{font-family:'Exo 2',sans-serif;font-size:15px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}
.status-badge{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:20px;flex-shrink:0}
.status-badge.waiting{background:var(--yellow-bg);border:1px solid rgba(245,158,11,.3);color:var(--yellow)}
.status-badge.playing{background:var(--green-bg);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.status-badge.reveal{background:var(--podium-bg);border:1px solid var(--podium-border);color:var(--podium)}
.status-badge.scores{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24}

/* PLAYERS */
.players-bar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0;min-height:50px;align-items:center}
.p-chip{display:flex;align-items:center;gap:6px;padding:4px 8px 4px 4px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);font-size:12px;font-weight:600;color:var(--text2);transition:all .25s}
.p-chip.submitted{background:var(--green-bg);border-color:rgba(16,185,129,.4);color:var(--green)}
.p-chip-av{width:22px;height:22px;border-radius:50%;background:var(--podium-bg);border:1px solid var(--podium-border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--podium);font-family:'Exo 2',sans-serif;font-style:italic;flex-shrink:0}
.p-chip.submitted .p-chip-av{background:var(--green-bg);border-color:rgba(16,185,129,.4);color:var(--green)}
.p-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0;line-height:1;margin-left:2px}
.p-del:hover{color:var(--red)}
.no-players{font-size:12px;color:var(--text3);font-style:italic}

/* TIMER */
.timer-row{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.timer-lbl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.timer-val{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;color:var(--podium);min-width:52px;text-align:center}
.timer-note{font-size:11px;color:var(--text3);margin-left:4px}

/* CONTENT */
.game-content{flex:1;overflow-y:auto;padding:16px 20px}

/* REVEAL */
.rev-list{display:flex;flex-direction:column;gap:8px}
.rev-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;min-height:54px;transition:all .4s cubic-bezier(.16,1,.3,1);opacity:.5}
.rev-item.revealed{background:var(--podium-bg);border-color:var(--podium-border);opacity:1}
.rev-rank{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;color:rgba(244,114,182,.3);width:24px;text-align:center;flex-shrink:0}
.rev-item.revealed .rev-rank{color:var(--podium)}
.rev-img{width:36px;height:36px;border-radius:7px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.rev-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.rev-line{flex:1;height:2px;background:var(--border2);border-radius:2px}
.rev-detail{font-size:11px;color:var(--podium);font-weight:600;margin-top:2px}

/* SCORES */
.score-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:6px}
.score-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.score-name{flex:1;font-size:13px;font-weight:600}
.score-pts{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;color:var(--podium)}

/* CONTROLS */
.game-controls{padding:10px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;background:var(--bg2)}

/* SIDEBAR */
.q-sidebar{display:flex;flex-direction:column;overflow:hidden}
.q-sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);flex-shrink:0}
.q-list{flex:1;overflow-y:auto}
.q-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;align-items:flex-start;gap:8px}
.q-item:hover{background:var(--bg3)}
.q-item.active{background:var(--podium-bg);border-left:3px solid var(--podium)}
.q-item.done{opacity:.35}
.q-num{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:800;font-style:italic;color:var(--text3);flex-shrink:0;min-width:20px}
.q-item.active .q-num{color:var(--podium)}
.q-text{font-size:12px;color:var(--text2);line-height:1.4;flex:1}
.q-timer{font-size:10px;color:var(--text3);margin-top:3px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:28px 32px;width:100%;max-width:420px;animation:aq-slideUp .25s ease}
.modal-title{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em;color:var(--podium);margin-bottom:20px}
.modal-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:block}
.modal-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:14px}
.modal-input:focus{border-color:var(--podium)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end}
</style>
</head>
<body>
<div class="aq-loading-overlay" id="loader"><div class="aq-spinner"></div></div>

<nav class="aq-nav">
  <a href="index.html" class="aq-nav-logo podium" style="text-decoration:none">Allo<b>Quizz</b></a>
  <div class="aq-nav-title">Le Podium</div>
  <div class="aq-nav-actions">
    <button class="aq-btn aq-btn-podium aq-btn-sm" onclick="openSpectateur()">📺 Spectateur</button>
    <a class="aq-btn aq-btn-ghost aq-btn-sm" href="index.html">← Accueil</a>
  </div>
</nav>

<!-- SELECTOR -->
<div class="view active" id="view-selector">
  <div class="sel-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div class="sel-title">Le <span>Podium</span></div>
      <button class="aq-btn aq-btn-podium" onclick="openNewModal()">+ Nouvelle partie</button>
    </div>
    <div id="sessions-list"><div class="aq-waiting" style="min-height:100px"><div class="aq-spinner"></div></div></div>
  </div>
</div>

<!-- GAME -->
<div class="view" id="view-game">
  <div class="game-layout">
    <div class="game-main">
      <div class="game-top">
        <div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px">Code</div>
          <div class="game-code-big" id="game-code">—</div>
        </div>
        <button class="copy-btn" onclick="copyLink()">🔗 Copier le lien joueur</button>
        <div class="game-q-area">
          <div class="game-q-lbl">Question</div>
          <div class="game-q-txt" id="game-q-txt">Sélectionnez une question →</div>
        </div>
        <div class="status-badge waiting" id="status-badge">En attente</div>
      </div>

      <div class="players-bar" id="players-bar">
        <span class="no-players">En attente de joueurs…</span>
      </div>

      <div class="timer-row" id="timer-row" style="display:none">
        <span class="timer-lbl">⏱ Chrono</span>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" onclick="adjTimer(-10)">−10</button>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" onclick="adjTimer(-5)">−5</button>
        <div class="timer-val" id="timer-val">60s</div>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" onclick="adjTimer(5)">+5</button>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" onclick="adjTimer(10)">+10</button>
        <span class="timer-note" id="timer-note"></span>
      </div>

      <div class="game-content" id="game-content">
        <div class="aq-waiting" style="min-height:180px">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          Sélectionnez une question →
        </div>
      </div>

      <div class="game-controls">
        <button class="aq-btn aq-btn-ghost aq-btn-sm" onclick="confirmQuit()">← Quitter</button>
        <div style="flex:1"></div>
        <button class="aq-btn aq-btn-podium aq-btn-sm" id="btn-launch" style="display:none" onclick="launchQuestion()">▶ Lancer</button>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" id="btn-rev-next" style="display:none" onclick="revealNext()">↓ Révéler suivant</button>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" id="btn-rev-all" style="display:none" onclick="revealAll()">↓↓ Tout révéler</button>
        <button class="aq-btn aq-btn-success aq-btn-sm" id="btn-scores" style="display:none" onclick="calcScores()">🏆 Scores</button>
        <button class="aq-btn aq-btn-ghost aq-btn-sm" id="btn-next-q" style="display:none" onclick="nextQuestion()">Suivante →</button>
      </div>
    </div>

    <div class="q-sidebar">
      <div class="q-sidebar-head">Questions</div>
      <div class="q-list" id="q-list"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="new-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeNewModal()">
  <div class="modal-box">
    <div class="modal-title">Nouvelle partie</div>
    <label class="modal-label">Code (optionnel — laisse vide pour générer)</label>
    <input class="modal-input" id="ng-code" placeholder="Ex: QUIZ" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    <div class="modal-footer">
      <button class="aq-btn aq-btn-ghost" onclick="closeNewModal()">Annuler</button>
      <button class="aq-btn aq-btn-podium" onclick="createSession()">Créer →</button>
    </div>
  </div>
</div>

<script>
const DB_URL='https://tsneytqibltnjarajcll.supabase.co';
const DB_KEY='sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const {createClient}=supabase;
const db=createClient(DB_URL,DB_KEY);

let questions=[],players=[],answers=[];
let sess=null,curQ=null,curItems=[];
let revealed=0,qTimer=60;
let pollInt=null;

function toast(msg,t=''){let el=document.getElementById('aq-toast');if(!el){el=document.createElement('div');el.id='aq-toast';document.body.appendChild(el);}el.textContent=msg;el.className='show'+(t?' '+t:'');setTimeout(()=>el.className='',2400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genCode(){return Math.random().toString(36).slice(2,6).toUpperCase();}
function showView(v){document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');}

async function init(){
  const[qRes,iRes]=await Promise.all([
    db.from('podium_questions').select('*').order('sort_order'),
    db.from('podium_items').select('*').order('correct_rank')
  ]);
  questions=(qRes.data||[]).map(q=>({...q,podium_items:(iRes.data||[]).filter(i=>i.question_id===q.id).sort((a,b)=>a.correct_rank-b.correct_rank)}));
  await loadSessions();
  document.getElementById('loader').classList.add('hidden');
}

// ── SESSIONS ──
async function loadSessions(){
  const{data}=await db.from('podium_sessions').select('*').order('created_at',{ascending:false}).limit(20);
  const list=document.getElementById('sessions-list');
  if(!data?.length){list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:32px;text-align:center">Aucune partie — crée-en une !</div>';return;}
  list.innerHTML=data.map(s=>{
    const date=new Date(s.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return`<div class="sess-row">
      <div class="sess-dot ${s.status||'waiting'}"></div>
      <div class="sess-info"><div class="sess-name">Partie du ${date}</div><div class="sess-meta">${s.status==='playing'?'En cours':s.status==='finished'?'Terminée':'En attente'}</div></div>
      <div class="sess-code">${s.code}</div>
      <div style="display:flex;gap:8px">
        <button class="aq-btn aq-btn-podium aq-btn-sm" onclick="openSession('${s.id}')">Ouvrir →</button>
        <button class="aq-btn aq-btn-danger aq-btn-sm" onclick="deleteSess('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function openNewModal(){document.getElementById('new-modal').style.display='flex';document.getElementById('ng-code').focus();}
function closeNewModal(){document.getElementById('new-modal').style.display='none';}

async function createSession(){
  const code=(document.getElementById('ng-code').value.trim().toUpperCase())||genCode();
  const{data,error}=await db.from('podium_sessions').insert({code,status:'waiting',current_question_id:null,revealed_count:0,done_question_ids:[]}).select().single();
  if(error){toast('Erreur : '+error.message,'error');return;}
  closeNewModal();
  await openSession(data.id);
}

async function openSession(id){
  const{data}=await db.from('podium_sessions').select('*').eq('id',id).single();
  if(!data){toast('Session introuvable','error');return;}
  sess=data; revealed=data.revealed_count||0; curQ=null; curItems=[]; answers=[];
  await loadPlayers();
  document.getElementById('game-code').textContent=sess.code;
  renderQList();
  showView('game');
  startPolling();
  if(data.current_question_id) await pickQuestion(data.current_question_id,false);
}

async function deleteSess(id){
  if(!confirm('Supprimer cette partie ?'))return;
  await Promise.all([
    db.from('podium_players').delete().eq('session_id',id),
    db.from('podium_answers').delete().eq('session_id',id),
    db.from('podium_sessions').delete().eq('id',id)
  ]);
  loadSessions();toast('Supprimée');
}

// ── PLAYERS ──
async function loadPlayers(){
  const{data}=await db.from('podium_players').select('*').eq('session_id',sess.id).eq('is_active',true).order('created_at');
  players=data||[];
  renderPlayers();
}

function renderPlayers(){
  const bar=document.getElementById('players-bar');
  if(!players.length){bar.innerHTML='<span class="no-players">En attente de joueurs…</span>';return;}
  const submitted=new Set(answers.map(a=>a.player_name));
  bar.innerHTML=players.map(p=>`
    <div class="p-chip ${submitted.has(p.name)?'submitted':''}">
      <div class="p-chip-av">${p.name[0].toUpperCase()}</div>
      <span>${esc(p.name)}</span>
      ${submitted.has(p.name)?'<span style="font-size:10px">✓</span>':''}
      <button class="p-del" onclick="removePlayer('${p.id}',event)" title="Supprimer">✕</button>
    </div>`).join('');
}

async function removePlayer(id,e){
  e.stopPropagation();
  if(!confirm('Supprimer ce joueur ?'))return;
  await db.from('podium_players').update({is_active:false}).eq('id',id);
  players=players.filter(p=>p.id!==id);
  renderPlayers();pushState();
}

// ── QUESTIONS ──
function renderQList(){
  const done=sess.done_question_ids||[];
  document.getElementById('q-list').innerHTML=questions.map((q,i)=>`
    <div class="q-item ${curQ?.id===q.id?'active':''} ${done.includes(q.id)?'done':''}" onclick="pickQuestion(${q.id},true)">
      <div class="q-num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="q-text">${esc(q.question)}</div>
        <div class="q-timer">⏱ ${q.timer_duration||60}s</div>
      </div>
    </div>`).join('');
}

async function pickQuestion(qId,updateDb){
  curQ=questions.find(q=>String(q.id)===String(qId));
  if(!curQ)return;
  curItems=curQ.podium_items||[];
  qTimer=curQ.timer_duration||60;
  revealed=0;
  document.getElementById('game-q-txt').textContent=curQ.question;
  document.getElementById('timer-row').style.display='flex';
  document.getElementById('timer-val').textContent=qTimer+'s';
  document.getElementById('timer-note').textContent='Défaut : '+(curQ.timer_duration||60)+'s';
  const{data:ans}=await db.from('podium_answers').select('*').eq('session_id',sess.id).eq('question_id',qId);
  answers=ans||[];
  renderPlayers();
  if(updateDb){
    await db.from('podium_sessions').update({current_question_id:qId,status:'waiting',revealed_count:0}).eq('id',sess.id);
    const{data}=await db.from('podium_sessions').select('*').eq('id',sess.id).single();
    sess=data;
  }
  renderQList();renderReveal();setStatus('waiting');updateBtns();
  pushState('waiting');
}

function adjTimer(d){qTimer=Math.max(10,Math.min(300,qTimer+d));document.getElementById('timer-val').textContent=qTimer+'s';}

async function launchQuestion(){
  if(!curQ)return;
  await db.from('podium_sessions').update({status:'playing',timer_duration:qTimer}).eq('id',sess.id);
  const{data}=await db.from('podium_sessions').select('*').eq('id',sess.id).single();
  sess=data;
  setStatus('playing');updateBtns();pushState('playing');
  toast('Question lancée ▶');
}

function renderReveal(){
  if(!curQ)return;
  document.getElementById('game-content').innerHTML=`<div class="rev-list">
    ${curItems.map((it,i)=>{
      const isRev=i<revealed;
      return`<div class="rev-item ${isRev?'revealed':''}" id="rv-${i}">
        <div class="rev-rank">${i+1}</div>
        ${it.image_url?`<img class="rev-img" src="${it.image_url}" alt="">`:''}
        ${isRev
          ?`<div><div class="rev-name">${esc(it.name)}</div>${it.detail?`<div class="rev-detail">${esc(it.detail)}</div>`:''}</div>`
          :'<div class="rev-line"></div>'}
      </div>`;
    }).join('')}
  </div>`;
}

async function revealNext(){
  if(revealed>=curItems.length){toast('Tout révélé');return;}
  revealed++;
  await db.from('podium_sessions').update({revealed_count:revealed}).eq('id',sess.id);
  renderReveal();updateBtns();pushState('reveal');
}

async function revealAll(){
  revealed=curItems.length;
  await db.from('podium_sessions').update({revealed_count:revealed}).eq('id',sess.id);
  renderReveal();updateBtns();pushState('reveal');
}

async function calcScores(){
  // Calculer points par joueur
  for(const ans of answers){
    let pts=0;
    (ans.rankings||[]).forEach((itemId,i)=>{if(String(itemId)===String(curItems[i]?.id))pts++;});
    if(pts===curItems.length)pts+=2; // bonus parfait
    const p=players.find(x=>x.name===ans.player_name);
    if(p){const ns=(p.score||0)+pts;await db.from('podium_players').update({score:ns}).eq('id',p.id);p.score=ns;}
  }
  await loadPlayers();
  // Afficher le classement
  const sorted=[...players].sort((a,b)=>b.score-a.score);
  document.getElementById('game-content').innerHTML=`
    <div style="font-family:'Exo 2',sans-serif;font-size:13px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em;color:var(--podium);margin-bottom:12px">🏆 Classement</div>
    ${sorted.map((p,i)=>`<div class="score-row">
      <div class="score-medal">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="score-name">${esc(p.name)}</div>
      <div class="score-pts">${p.score||0} pts</div>
    </div>`).join('')}`;
  setStatus('scores');updateBtns();pushState('scores');
}

async function nextQuestion(){
  if(!curQ)return;
  const done=[...(sess.done_question_ids||[])];
  if(!done.includes(curQ.id))done.push(curQ.id);
  await db.from('podium_sessions').update({done_question_ids:done,status:'waiting',current_question_id:null,revealed_count:0}).eq('id',sess.id);
  const{data}=await db.from('podium_sessions').select('*').eq('id',sess.id).single();
  sess=data;curQ=null;curItems=[];answers=[];revealed=0;
  document.getElementById('game-q-txt').textContent='Sélectionnez une question →';
  document.getElementById('timer-row').style.display='none';
  document.getElementById('game-content').innerHTML='<div class="aq-waiting" style="min-height:180px"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Sélectionnez une question →</div>';
  renderQList();setStatus('waiting');updateBtns();pushState('waiting');
  toast('Prêt pour la suivante');
}

function setStatus(s){
  const el=document.getElementById('status-badge');
  const labels={waiting:'En attente',playing:'En cours',reveal:'Révélation',scores:'Scores'};
  el.textContent=labels[s]||s;el.className='status-badge '+s;
}

function updateBtns(){
  const hasQ=!!curQ,status=sess?.status,allRev=revealed>=curItems.length;
  document.getElementById('btn-launch').style.display=hasQ&&status==='waiting'?'inline-flex':'none';
  document.getElementById('btn-rev-next').style.display=hasQ&&status!=='waiting'&&!allRev?'inline-flex':'none';
  document.getElementById('btn-rev-all').style.display=hasQ&&status!=='waiting'&&!allRev?'inline-flex':'none';
  document.getElementById('btn-scores').style.display=hasQ&&allRev?'inline-flex':'none';
  document.getElementById('btn-next-q').style.display=hasQ?'inline-flex':'none';
}

// ── POLLING ──
function startPolling(){
  if(pollInt)clearInterval(pollInt);
  pollInt=setInterval(async()=>{
    if(!sess)return;
    const[sRes,pRes]=await Promise.all([
      db.from('podium_sessions').select('*').eq('id',sess.id).single(),
      db.from('podium_players').select('*').eq('session_id',sess.id).eq('is_active',true).order('created_at')
    ]);
    if(sRes.data)sess=sRes.data;
    if(pRes.data)players=pRes.data;
    if(curQ){
      const{data:ans}=await db.from('podium_answers').select('*').eq('session_id',sess.id).eq('question_id',curQ.id);
      if(ans)answers=ans;
    }
    renderPlayers();
    pushState(sess.status==='playing'?'playing':'waiting');
  },2500);
}

// ── SPECTATOR ──
function getState(view){
  return{
    view:view||sess?.status||'waiting',
    code:sess?.code,
    question:curQ?.question||null,
    question_id:curQ?.id,
    items:curItems,
    players:players.map(p=>({name:p.name,score:p.score||0,submitted:answers.some(a=>a.player_name===p.name)})),
    revealed_count:revealed,
    answers:answers.map(a=>({player_name:a.player_name,rankings:a.rankings}))
  };
}
function pushState(view){
  const state=getState(view);
  try{localStorage.setItem('aq_podium',JSON.stringify(state));}catch(e){}
  try{const bc=new BroadcastChannel('aq_podium');bc.postMessage(state);bc.close();}catch(e){}
}
function openSpectateur(){pushState();window.open('spectateur-podium.html','_blank');}

function copyLink(){
  const url=`${location.origin}${location.pathname.replace('podium.html','podium-joueur.html')}?code=${sess?.code}`;
  navigator.clipboard.writeText(url).then(()=>toast('Lien copié ✓','success')).catch(()=>prompt('Copie ce lien :',url));
}

function confirmQuit(){if(pollInt)clearInterval(pollInt);sess=null;curQ=null;loadSessions();showView('selector');}

init();
</script>
