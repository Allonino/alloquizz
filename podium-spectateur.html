<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Podium — TV</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#06060d;color:#f0f0f5}
body{font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.top{display:flex;align-items:center;padding:16px 40px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;gap:20px}
.top-logo{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);flex-shrink:0}
.top-logo span{color:#f472b6}
.top-q{flex:1;text-align:center;font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}
.top-code{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:800;font-style:italic;color:rgba(255,255,255,.2);letter-spacing:.1em;flex-shrink:0}

.main{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* WAITING */
.s-waiting{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center}
.w-code{font-family:'Exo 2',sans-serif;font-size:72px;font-weight:800;font-style:italic;color:#f472b6;letter-spacing:.12em;line-height:1}
.w-hint{font-size:14px;color:rgba(255,255,255,.3)}
.w-teams{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.w-chip{padding:8px 20px;border-radius:20px;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em;border:1.5px solid rgba(244,114,182,.4);color:#f472b6;background:rgba(244,114,182,.08)}

/* PLAYING */
.s-playing{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding:0 40px}
.p-title{font-size:12px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.p-teams{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.p-card{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 24px;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:160px;transition:all .4s}
.p-card.ready{border-color:rgba(79,206,143,.5);background:rgba(79,206,143,.06)}
.p-name{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em}
.p-score{font-family:'Exo 2',sans-serif;font-size:44px;font-weight:800;font-style:italic;color:#f472b6;line-height:1}
.p-status{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.p-status.ready{background:rgba(79,206,143,.15);color:#4fce8f;border:1px solid rgba(79,206,143,.3)}
.p-status.wait{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}

/* REVEAL */
.s-reveal{display:flex;flex-direction:column;gap:16px;width:100%;height:100%;padding:16px 40px;overflow-y:auto}
.rev-slots{display:flex;gap:10px}
.rev-slot{flex:1;display:flex;flex-direction:column;gap:6px;align-items:center}
.slot-rank{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:800;font-style:italic;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase}
.slot-card{width:100%;border-radius:12px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:all .5s cubic-bezier(.16,1,.3,1)}
.slot-card.revealed{border-color:rgba(244,114,182,.5);background:rgba(244,114,182,.08)}
.slot-card img{width:100%;height:72px;object-fit:cover}
.slot-name{font-size:13px;font-weight:700;text-align:center;padding:6px 4px;color:#f0f0f5}
.slot-detail{font-size:11px;color:rgba(244,114,182,.7);font-weight:600;text-align:center;padding:0 4px 6px}
.slot-hidden{font-size:32px;color:rgba(255,255,255,.08)}
.rev-teams{display:flex;flex-direction:column;gap:8px}
.rt-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.rt-head{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.rt-name{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em;flex:1}
.rt-pts{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;color:#f472b6}
.rt-cards{display:flex;gap:8px;padding:8px 16px}
.mini{flex:1;border-radius:8px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;padding:5px 4px;min-height:48px;transition:all .4s cubic-bezier(.16,1,.3,1);overflow:hidden}
.mini img{width:100%;height:30px;object-fit:cover;border-radius:5px;margin-bottom:3px}
.mini.correct{border-color:#4fce8f;background:rgba(79,206,143,.12);color:#4fce8f}
.mini.wrong{border-color:#f87171;background:rgba(248,113,113,.1);color:#f87171}
.rev-list{display:flex;flex-direction:column;gap:8px}
.rev-item{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 18px;transition:all .4s cubic-bezier(.16,1,.3,1);min-height:64px}
.rev-item.revealed{border-color:rgba(244,114,182,.5);background:rgba(244,114,182,.08)}
.rev-rank{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;color:rgba(244,114,182,.3);width:32px;flex-shrink:0;text-align:center;transition:color .3s}
.rev-item.revealed .rev-rank{color:#f472b6}
.rev-item img{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0}
.rev-name{flex:1;font-size:18px;font-weight:700;color:#f0f0f5}
.rev-detail{font-size:13px;color:rgba(244,114,182,.7);font-weight:600;margin-left:auto;flex-shrink:0}
.rev-hidden{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:2px}
</style>
</head>
<body>
<div class="top">
  <div class="top-logo">Le <span>Podium</span></div>
  <div class="top-q" id="top-q">En attente…</div>
  <div class="top-code" id="top-code"></div>
</div>
<div class="main" id="main"></div>

<script>
const DB_URL='https://tsneytqibltnjarajcll.supabase.co';
const DB_KEY='sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const {createClient}=supabase;
const db=createClient(DB_URL,DB_KEY);
let questions=[], lastView='', lastRevealed=-1;

async function init(){
  const {data}=await db.from('podium_questions').select('*,podium_items(*)').order('sort_order');
  questions=(data||[]).map(q=>({...q,podium_items:(q.podium_items||[]).sort((a,b)=>a.correct_rank-b.correct_rank)}));
  try{const bc=new BroadcastChannel('podium_spectator');bc.onmessage=e=>applyState(e.data);}catch(e){}
  setInterval(()=>{try{const r=localStorage.getItem('podium_spectator');if(r)applyState(JSON.parse(r));}catch(e){}},1000);
  try{const r=localStorage.getItem('podium_spectator');if(r)applyState(JSON.parse(r));}catch(e){}
}

window.applyState=function(s){
  if(!s)return;
  const code=s.code||'';
  const teams=s.teams||[];
  const q=questions.find(x=>String(x.id)===String(s.question_id));
  document.getElementById('top-code').textContent=code;
  document.getElementById('top-q').textContent=q?q.question:'En attente…';

  if(s.view==='reveal'){
    document.getElementById('top-q').textContent=q?q.question:'Révélation';
    const items=q?q.podium_items||[]:[];
    const revealed=s.revealed_count||0;
    const answers=s.answers||[];
    const updatedTeams=s.teams||teams;
    if(lastView!=='reveal'){lastView='reveal';lastRevealed=-1;buildReveal(items,updatedTeams,answers,revealed);}
    else if(revealed!==lastRevealed){lastRevealed=revealed;updateReveal(items,updatedTeams,answers,revealed);}
  } else if(s.view==='playing'||s.view==='stopped'){
    if(lastView!=='playing'){
      lastView='playing';
      const url=`${location.origin}${location.pathname.replace('podium-spectateur.html','podium-joueur.html')}?code=${code}`;
      document.getElementById('main').innerHTML=`<div class="s-playing">
        <div class="p-title">En cours</div>
        <div class="p-teams" id="sp-teams"></div>
        ${!q?`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(url)}&bgcolor=06060d&color=f472b6&margin=6" style="width:120px;height:120px;border-radius:10px">
          <div style="font-family:'Exo 2',sans-serif;font-size:40px;font-weight:800;font-style:italic;color:#f472b6;letter-spacing:.1em">${code}</div>
        </div>`:''}
      </div>`;
    }
    const el=document.getElementById('sp-teams');
    if(el)el.innerHTML=teams.map(t=>`
      <div class="p-card ${t.submitted?'ready':''}">
        <div class="p-name">${t.name}</div>
        <div class="p-score">${t.score||0}</div>
        <div class="p-status ${t.submitted?'ready':'wait'}">${t.submitted?'✓ Prêt':'En cours…'}</div>
      </div>`).join('');
  } else {
    if(lastView==='default')return;
    lastView='default';
    const url=`${location.origin}${location.pathname.replace('podium-spectateur.html','podium-joueur.html')}?code=${code}`;
    document.getElementById('main').innerHTML=`<div class="s-waiting">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}&bgcolor=06060d&color=f472b6&margin=8" style="width:180px;height:180px;border-radius:14px">
      <div><div class="w-code">${code||'—'}</div><div class="w-hint">Rejoindre sur cette page</div></div>
      <div class="w-teams">${teams.map(t=>`<div class="w-chip">${t.name}</div>`).join('')}</div>
    </div>`;
  }
};

function buildReveal(items,teams,answers,revealed){
  document.getElementById('main').innerHTML=`<div class="s-reveal">
    <div class="rev-list">
      ${items.map((it,i)=>`
        <div class="rev-item ${i<revealed?'revealed':''}" id="ss-${i}">
          <div class="rev-rank">${i+1}</div>
          ${i<revealed
            ?(it.image_url?`<img src="${it.image_url}" alt="">`:'')+`<div class="rev-name">${it.name}</div>`+(it.detail?`<div class="rev-detail">${it.detail}</div>`:'')
            :'<div class="rev-hidden"></div>'}
        </div>`).join('')}
    </div>
    <div class="rev-teams">${buildTeamRows(items,teams,answers,revealed)}</div>
  </div>`;
  lastRevealed=revealed;
}

function updateReveal(items,teams,answers,revealed){
  items.forEach((it,i)=>{
    if(i>=revealed)return;
    const el=document.getElementById('ss-'+i);
    if(!el||el.classList.contains('revealed'))return;
    el.classList.add('revealed');
    el.innerHTML=`<div class="rev-rank">${i+1}</div>`+
      (it.image_url?`<img src="${it.image_url}" alt="">`:'')+
      `<div class="rev-name">${it.name}</div>`+
      (it.detail?`<div class="rev-detail">${it.detail}</div>`:'');
  });
  const el=document.querySelector('.rev-teams');
  if(el)el.innerHTML=buildTeamRows(items,teams,answers,revealed);
  lastRevealed=revealed;
}

function buildTeamRows(items,teams,answers,revealed){
  return teams.map(t=>{
    const ans=answers.find(a=>a.team_name===t.name);
    const ranking=ans?ans.rankings:[];
    const hasAnswer=!!ans&&ranking.length>0;
    return `<div class="rt-row">
      <div class="rt-head">
        <div class="rt-name">${t.name}</div>
        ${!hasAnswer?'<div style="font-size:11px;color:rgba(255,80,80,.5);font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex:1;margin-left:8px">Pas de réponse</div>':''}
        <div class="rt-pts">${t.score||0} pts</div>
      </div>
      ${hasAnswer?`<div class="rt-cards">
        ${items.map((_,i)=>{
          const itemId=ranking[i];
          const item=items.find(x=>String(x.id)===String(itemId))||{name:'?'};
          const isRev=i<revealed;
          const ok=isRev&&String(itemId)===String(items[i].id);
          return `<div class="mini ${isRev?(ok?'correct':'wrong'):''}">
            ${item.image_url&&isRev?`<img src="${item.image_url}" alt="">`:'' }
            <span>${item.name||'?'}</span>
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
