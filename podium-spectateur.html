<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Podium — Spectateur</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}

.sp-top{display:flex;align-items:center;padding:14px 32px;border-bottom:1px solid var(--border);flex-shrink:0;gap:16px}
.sp-logo{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);flex-shrink:0}
.sp-logo b{color:var(--podium)}
.sp-q{flex:1;text-align:center;font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}
.sp-code{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:800;font-style:italic;color:rgba(255,255,255,.2);letter-spacing:.1em;flex-shrink:0}
.sp-main{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* WAITING */
.s-wait{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center}
.w-code{font-family:'Exo 2',sans-serif;font-size:72px;font-weight:800;font-style:italic;color:var(--podium);letter-spacing:.12em;line-height:1}
.w-hint{font-size:14px;color:rgba(255,255,255,.3)}
.w-chips{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.w-chip{padding:8px 20px;border-radius:20px;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em;border:1.5px solid var(--podium-border);color:var(--podium);background:var(--podium-bg)}

/* PLAYING */
.s-play{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding:0 40px}
.p-lbl{font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.p-teams{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.p-card{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 24px;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:160px;transition:all .4s}
.p-card.ready{border-color:rgba(79,206,143,.5);background:rgba(79,206,143,.06)}
.p-name{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em}
.p-score{font-family:'Exo 2',sans-serif;font-size:44px;font-weight:800;font-style:italic;color:var(--podium);line-height:1}
.p-status{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.p-status.ready{background:rgba(79,206,143,.15);color:#4fce8f;border:1px solid rgba(79,206,143,.3)}
.p-status.wait{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}

/* REVEAL */
.s-reveal{width:100%;height:100%;overflow-y:auto;padding:16px 32px;display:flex;align-items:flex-start;justify-content:center}
.rev-inner{max-width:1000px;width:100%;display:flex;flex-direction:column;gap:7px}
.rev-hdr,.rev-row{display:grid;gap:8px;align-items:stretch}
.rev-ans{display:flex;align-items:center;gap:10px;border-radius:10px;padding:8px 12px;border:1.5px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);transition:all .4s cubic-bezier(.16,1,.3,1);min-height:62px}
.rev-ans.rev{border-color:var(--podium-border);background:var(--podium-bg)}
.rev-rk{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;color:rgba(244,114,182,.25);width:22px;flex-shrink:0;text-align:center}
.rev-ans.rev .rev-rk{color:var(--podium)}
.rsq{width:40px;height:40px;border-radius:7px;flex-shrink:0;object-fit:cover;background:rgba(255,255,255,.08)}
.rev-nm{font-size:14px;font-weight:700;color:var(--text)}
.rev-dt{font-size:11px;color:var(--podium);font-weight:600;margin-top:2px}
.rev-hid{flex:1;height:1.5px;background:rgba(255,255,255,.06);border-radius:2px}
.tc{border-radius:10px;display:flex;flex-direction:column;align-items:center;padding:6px 5px 5px;gap:4px;min-height:62px;justify-content:center}
.tc.ok{border:1.5px solid rgba(79,206,143,.5);background:rgba(79,206,143,.08)}
.tc.ko{border:1.5px solid rgba(248,113,113,.5);background:rgba(248,113,113,.08)}
.tc.wt{border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.tcsq{width:40px;height:40px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,.08)}
.tcnm{font-size:11px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.tc.ok .tcnm{color:#4fce8f}.tc.ko .tcnm{color:#f87171}.tc.wt .tcnm{color:rgba(255,255,255,.55)}
.tcsc{font-size:20px;font-weight:700;color:var(--podium);text-align:center;line-height:1}
.tclbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-top:2px}
</style>
</head>
<body>
<div class="sp-top">
  <div class="sp-logo">Le <b>Podium</b></div>
  <div class="sp-q" id="sp-q">En attente…</div>
  <div class="sp-code" id="sp-code"></div>
</div>
<div class="sp-main" id="sp-main">
  <div class="aq-waiting">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    En attente du maître du jeu…
  </div>
</div>

<script>
const DB_URL = 'https://tsneytqibltnjarajcll.supabase.co';
const DB_KEY = 'sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const { createClient } = supabase;
const db = createClient(DB_URL, DB_KEY);

let questions = [], lastView = '', lastRevealed = -1;

async function init() {
  const [qRes, iRes] = await Promise.all([
    db.from('podium_questions').select('*').order('sort_order'),
    db.from('podium_items').select('*').order('correct_rank')
  ]);
  questions = (qRes.data||[]).map(q => ({
    ...q,
    podium_items: (iRes.data||[]).filter(i => i.question_id === q.id).sort((a,b) => a.correct_rank - b.correct_rank)
  }));
  // Listen
  try { const bc = new BroadcastChannel('aq_podium'); bc.onmessage = e => applyState(e.data); } catch(e) {}
  let lastRaw = null;
  setInterval(() => {
    try {
      const raw = localStorage.getItem('aq_podium');
      if (raw && raw !== lastRaw) { lastRaw = raw; applyState(JSON.parse(raw)); }
    } catch(e) {}
  }, 500);
  try { applyState(JSON.parse(localStorage.getItem('aq_podium'))); } catch(e) {}
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyState(s) {
  if (!s) return;
  const code = s.code || '';
  const teams = s.teams || [];
  const q = questions.find(x => String(x.id) === String(s.question_id));
  document.getElementById('sp-code').textContent = code;
  document.getElementById('sp-q').textContent = q ? q.question : 'En attente…';

  if (s.view === 'reveal') {
    const items = q ? q.podium_items || [] : [];
    const revealed = s.revealed_count || 0;
    const answers = s.answers || [];
    if (lastView !== 'reveal') { lastView = 'reveal'; lastRevealed = -1; buildReveal(items, teams, answers, revealed); }
    else if (revealed !== lastRevealed) { updateReveal(items, teams, answers, revealed); }
  } else if (s.view === 'playing' || s.view === 'waiting') {
    if (lastView !== 'playing') {
      lastView = 'playing';
      const url = `${location.origin}${location.pathname.replace('spectateur-podium.html','podium-joueur.html')}?code=${code}`;
      document.getElementById('sp-main').innerHTML = `<div class="s-play">
        <div class="p-lbl">En cours</div>
        <div class="p-teams" id="sp-teams"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(url)}&bgcolor=06060d&color=f472b6&margin=6" style="width:120px;height:120px;border-radius:10px">
          <div style="font-family:'Exo 2',sans-serif;font-size:40px;font-weight:800;font-style:italic;color:var(--podium);letter-spacing:.1em">${code}</div>
        </div>
      </div>`;
    }
    const el = document.getElementById('sp-teams');
    if (el) el.innerHTML = teams.map(t => `
      <div class="p-card ${t.submitted?'ready':''}">
        <div class="p-name">${esc(t.name)}</div>
        <div class="p-score">${t.score||0}</div>
        <div class="p-status ${t.submitted?'ready':'wait'}">${t.submitted?'✓ Prêt':'En cours…'}</div>
      </div>`).join('');
  } else {
    if (lastView === 'default') return;
    lastView = 'default';
    const url = `${location.origin}${location.pathname.replace('spectateur-podium.html','podium-joueur.html')}?code=${code}`;
    document.getElementById('sp-main').innerHTML = `<div class="s-wait">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}&bgcolor=06060d&color=f472b6&margin=8" style="width:180px;height:180px;border-radius:14px">
      <div><div class="w-code">${code||'—'}</div><div class="w-hint">Rejoindre sur cette page</div></div>
      <div class="w-chips">${teams.map(t=>`<div class="w-chip">${esc(t.name)}</div>`).join('')}</div>
    </div>`;
  }
}

function buildReveal(items, teams, answers, revealed) {
  const cols = `2fr ${teams.map(()=>'1fr').join(' ')}`;
  document.getElementById('sp-main').innerHTML = `<div class="s-reveal"><div class="rev-inner">
    <div class="rev-hdr" style="grid-template-columns:${cols}">
      <div></div>
      ${teams.map(t=>`<div><div class="tcsc">${t.score||0}</div><div class="tclbl">${esc(t.name)}</div></div>`).join('')}
    </div>
    ${items.map((it,i) => {
      const isRev = i < revealed;
      return `<div class="rev-row" style="grid-template-columns:${cols}">
        <div class="rev-ans${isRev?' rev':''}" id="sa-${i}">
          <div class="rev-rk">${i+1}</div>
          ${isRev
            ? (it.image_url?`<img class="rsq" src="${it.image_url}" alt="">`:'')+`<div><div class="rev-nm">${esc(it.name)}</div>${it.detail?`<div class="rev-dt">${esc(it.detail)}</div>`:''}</div>`
            : '<div class="rev-hid"></div>'}
        </div>
        ${teams.map(t => {
          const ans = answers.find(a => a.team_name === t.name);
          const ranking = ans?.rankings || [];
          const itemId = ranking[i];
          const item = items.find(x => String(x.id) === String(itemId));
          const ok = isRev && String(itemId) === String(it.id);
          const cls = isRev ? (ok?'ok':'ko') : 'wt';
          return `<div class="tc ${cls}" id="stc-${t.name.replace(/ /g,'_')}-${i}">
            <div class="tcsq" ${item?.image_url&&isRev?`style="background:url('${item.image_url}') center/cover"`:''} ></div>
            <div class="tcnm">${isRev?(ok?'✓ ':'✗ '):''}${esc(item?.name||'?')}</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div></div>`;
  lastRevealed = revealed;
}

function updateReveal(items, teams, answers, revealed) {
  if (!document.getElementById('sa-0')) { buildReveal(items, teams, answers, revealed); return; }
  for (let i = lastRevealed; i < revealed; i++) {
    const it = items[i];
    const cell = document.getElementById('sa-'+i);
    if (cell && !cell.classList.contains('rev')) {
      cell.classList.add('rev');
      cell.innerHTML = `<div class="rev-rk">${i+1}</div>`
        + (it.image_url?`<img class="rsq" src="${it.image_url}" alt="">`:'')
        + `<div><div class="rev-nm">${esc(it.name)}</div>${it.detail?`<div class="rev-dt">${esc(it.detail)}</div>`:''}</div>`;
    }
    teams.forEach(t => {
      const ans = answers.find(a => a.team_name === t.name);
      const key = t.name.replace(/ /g,'_');
      const tc = document.getElementById(`stc-${key}-${i}`);
      if (!tc) return;
      const ranking = ans?.rankings || [];
      const itemId = ranking[i];
      const item = items.find(x => String(x.id) === String(itemId));
      const ok = String(itemId) === String(it.id);
      tc.className = 'tc ' + (ans?(ok?'ok':'ko'):'ko');
      const nm = tc.querySelector('.tcnm');
      if (nm) nm.textContent = (ans?(ok?'✓ ':'✗ '):'— ') + esc(item?.name||'?');
      if (item?.image_url) { const sq = tc.querySelector('.tcsq'); if (sq) sq.style.background = `url('${item.image_url}') center/cover`; }
    });
  }
  lastRevealed = revealed;
}

init();
</script>
</body>
</html>
