<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlloQuizz — Le Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:#06060d;color:#f0f0f5;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(6,6,13,0.95);border-bottom:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#f0f0f5;padding:14px 0;letter-spacing:-.02em}
.nav-logo span{color:#f87171}
.nav-right{display:flex;gap:10px;align-items:center}

/* ── LOADING ── */
#loading-overlay{position:fixed;inset:0;background:#06060d;z-index:999;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,0.3);transition:opacity .4s}
#loading-overlay.hidden{opacity:0;pointer-events:none}

/* ── VIEWS ── */
.view{display:none;flex:1;flex-direction:column}
.view.active{display:flex}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e2e;border:1px solid rgba(255,255,255,0.12);color:#f0f0f5;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:filter .2s,transform .15s;font-family:'DM Sans',sans-serif}
.btn:hover{filter:brightness(1.15)}
.btn:active{transform:scale(.97)}
.btn-primary{background:#f87171;color:#fff}
.btn-ghost{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-t1{background:rgba(79,158,255,0.15);border:1px solid #4f9eff;color:#4f9eff}
.btn-t2{background:rgba(255,107,157,0.15);border:1px solid #ff6b9d;color:#ff6b9d}
.btn-sm{padding:7px 14px;font-size:11px}

/* ════════════════════════════
   SELECTOR VIEW
════════════════════════════ */
#view-selector{padding:32px 40px 48px;gap:24px;max-width:900px;margin:0 auto;width:100%}
.sel-title{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em;color:#f0f0f5}
.sel-title span{color:#f87171}
.sel-subtitle{font-size:13px;color:rgba(255,255,255,0.35);margin-top:6px}

.questions-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.q-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .2s,background .2s}
.q-card:hover{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.35)}
.q-card-num{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;color:rgba(248,113,113,0.4);min-width:28px}
.q-card-text{flex:1;font-size:15px;font-weight:500;color:#f0f0f5}
.q-card-count{font-size:12px;color:rgba(255,255,255,0.25);flex-shrink:0}
.q-card-arrow{color:rgba(255,255,255,0.2);font-size:18px}

.sel-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.25);font-size:14px}

/* Team names */
.team-setup{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
.team-input-wrap{display:flex;flex-direction:column;gap:8px}
.team-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.team-label.t1{color:#4f9eff}.team-label.t2{color:#ff6b9d}
.team-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:#f0f0f5;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .2s}
.team-input:focus{border-color:rgba(255,255,255,0.3)}

.section-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0}

/* ════════════════════════════
   GAME VIEW
════════════════════════════ */
#view-game{padding:0;gap:0}

/* Top bar */
.game-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 32px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;gap:16px}
.team-score-block{display:flex;align-items:center;gap:14px}
.team-score-block.t2{flex-direction:row-reverse}
.team-name-disp{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em}
.team-name-disp.t1{color:#4f9eff}.team-name-disp.t2{color:#ff6b9d}
.team-score-disp{font-family:'Exo 2',sans-serif;font-size:42px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.team-score-disp.t1{color:#4f9eff}.team-score-disp.t2{color:#ff6b9d}
.team-score-disp.bump{animation:bump .3s ease-out}
@keyframes bump{0%{transform:scale(1.4)}100%{transform:scale(1)}}
.game-q-center{text-align:center}
.game-q-label{font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.game-q-text{font-size:15px;font-weight:600;color:#f0f0f5;max-width:340px;line-height:1.3}

/* Active team indicator */
.turn-indicator{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 32px;flex-shrink:0}
.turn-badge{padding:6px 18px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Exo 2',sans-serif;font-style:italic;transition:all .3s}
.turn-badge.t1{background:rgba(79,158,255,0.15);border:1px solid rgba(79,158,255,0.4);color:#4f9eff}
.turn-badge.t2{background:rgba(255,107,157,0.15);border:1px solid rgba(255,107,157,0.4);color:#ff6b9d}
.turn-badge.inactive{opacity:.3}
.turn-sep{color:rgba(255,255,255,0.15);font-size:12px}

/* Answers board */
.answers-board{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 40px}
.answers-grid{width:100%;max-width:700px;display:flex;flex-direction:column;gap:10px}

.answer-row{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;overflow:hidden;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  cursor:pointer;
  min-height:62px;
}
.answer-row:hover{border-color:rgba(255,255,255,0.15)}
.answer-row.revealed-t1{background:rgba(79,158,255,0.12);border-color:rgba(79,158,255,0.4)}
.answer-row.revealed-t2{background:rgba(255,107,157,0.12);border-color:rgba(255,107,157,0.4)}
.answer-row.revealed-t1 .ans-rank{color:#4f9eff}
.answer-row.revealed-t2 .ans-rank{color:#ff6b9d}

.ans-rank{width:52px;text-align:center;font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;font-style:italic;color:rgba(255,255,255,0.15);flex-shrink:0;transition:color .3s}
.ans-text{flex:1;font-size:16px;font-weight:600;color:#f0f0f5;padding:0 8px;transition:opacity .3s}
.ans-text.hidden-text{opacity:0}
.ans-points{
  width:72px;text-align:center;flex-shrink:0;
  font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;
  padding:0 12px;
  transition:opacity .3s;
}
.ans-points.hidden-pts{opacity:0}
.ans-points.t1{color:#4f9eff}.ans-points.t2{color:#ff6b9d}
.ans-points.neutral{color:rgba(255,255,255,0.3)}

/* Controls */
.game-controls{padding:16px 32px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.06);gap:16px;flex-wrap:wrap}
.ctrl-left{display:flex;gap:10px;align-items:center}
.ctrl-right{display:flex;gap:10px;align-items:center}
.ctrl-center{display:flex;gap:10px;align-items:center}

/* ════════════════════════════
   ADMIN VIEW
════════════════════════════ */
#view-admin{padding:32px 40px 48px;gap:24px;max-width:900px;margin:0 auto;width:100%}
.admin-title{font-family:'Exo 2',sans-serif;font-size:24px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em}

.admin-questions{display:flex;flex-direction:column;gap:16px}
.admin-q-block{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden}
.admin-q-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.admin-q-text{flex:1;font-size:14px;font-weight:600}
.admin-q-actions{display:flex;gap:8px}
.admin-answers-list{padding:12px 18px;display:flex;flex-direction:column;gap:8px}
.admin-ans-row{display:flex;align-items:center;gap:10px}
.admin-ans-text{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;font-size:13px;color:#f0f0f5;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.admin-ans-text:focus{border-color:rgba(255,255,255,0.25)}
.admin-ans-pts{width:70px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;font-size:13px;color:#f87171;font-family:'DM Sans',sans-serif;outline:none;text-align:center;transition:border-color .2s}
.admin-ans-pts:focus{border-color:rgba(248,113,113,0.4)}
.admin-ans-del{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:6px;transition:color .2s,background .2s}
.admin-ans-del:hover{color:#f87171;background:rgba(248,113,113,0.1)}

.add-q-form{background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);border-radius:14px;padding:18px 20px;display:flex;gap:12px;align-items:center}
.add-q-input{flex:1;background:transparent;border:none;font-size:14px;color:#f0f0f5;font-family:'DM Sans',sans-serif;outline:none}
.add-q-input::placeholder{color:rgba(255,255,255,0.2)}

/* ════════════════════════════
   SPECTATOR WINDOW STYLES (injected)
════════════════════════════ */
</style>
</head>
<body>
<div id="loading-overlay">Chargement…</div>
<div id="toast"></div>

<nav class="nav">
  <div class="nav-logo">Allo<span>Quizz</span> <span style="color:rgba(255,255,255,0.2);font-size:13px;font-weight:400;margin-left:6px">Le Panel</span></div>
  <div class="nav-right">
    <button class="btn btn-ghost btn-sm" onclick="showView('admin')" id="btn-nav-admin">⚙ Questions</button>
    <button class="btn btn-ghost btn-sm" onclick="showView('selector')" id="btn-nav-play">▶ Jouer</button>
    <button class="btn btn-ghost btn-sm" onclick="openSpectator()">📺 Écran TV</button>
    <a class="btn btn-ghost btn-sm" href="index.html">← Accueil</a>
  </div>
</nav>

<!-- ══ SELECTOR ══ -->
<div class="view" id="view-selector">
  <div style="display:flex;flex-direction:column;gap:24px;width:100%">
    <div>
      <div class="sel-title">Le <span>Panel</span></div>
      <div class="sel-subtitle">Choisissez une question pour commencer</div>
    </div>

    <div>
      <div class="section-label">Noms des équipes</div>
      <div class="team-setup" style="margin-top:10px">
        <div class="team-input-wrap">
          <div class="team-label t1">Équipe 1</div>
          <input class="team-input" id="team1-name" value="Équipe 1" maxlength="20">
        </div>
        <div class="team-input-wrap">
          <div class="team-label t2">Équipe 2</div>
          <input class="team-input" id="team2-name" value="Équipe 2" maxlength="20">
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Questions disponibles</div>
      <div class="questions-list" id="questions-list" style="margin-top:10px">
        <div class="sel-empty">Aucune question — créez-en dans ⚙ Questions</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="view" id="view-game">
  <div class="game-top">
    <div class="team-score-block">
      <div class="team-score-disp t1" id="score-t1">0</div>
      <div class="team-name-disp t1" id="name-t1">Équipe 1</div>
    </div>
    <div class="game-q-center">
      <div class="game-q-label">Question</div>
      <div class="game-q-text" id="game-q-text">—</div>
    </div>
    <div class="team-score-block t2">
      <div class="team-score-disp t2" id="score-t2">0</div>
      <div class="team-name-disp t2" id="name-t2">Équipe 2</div>
    </div>
  </div>

  <div class="turn-indicator">
    <div class="turn-badge t1" id="turn-t1">Équipe 1</div>
    <div class="turn-sep">joue</div>
    <div class="turn-badge t2 inactive" id="turn-t2">Équipe 2</div>
  </div>

  <div class="answers-board">
    <div class="answers-grid" id="answers-grid"></div>
  </div>

  <div class="game-controls">
    <div class="ctrl-left">
      <button class="btn btn-ghost btn-sm" onclick="confirmBack()">← Quitter</button>
    </div>
    <div class="ctrl-center">
      <button class="btn btn-t1 btn-sm" id="btn-point-t1" onclick="givePoint(1)">+1 pt <span id="ctrl-name-t1">Équipe 1</span></button>
      <button class="btn btn-t2 btn-sm" id="btn-point-t2" onclick="givePoint(2)">+1 pt <span id="ctrl-name-t2">Équipe 2</span></button>
    </div>
    <div class="ctrl-right">
      <button class="btn btn-ghost btn-sm" onclick="switchTurn()">Passer le tour ↔</button>
    </div>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div class="view" id="view-admin">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div class="admin-title">Questions</div>
    <button class="btn btn-ghost btn-sm" onclick="showView('selector')">← Retour</button>
  </div>
  <div class="admin-questions" id="admin-questions"></div>
  <div id="debug-box" style="display:none;background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.3);border-radius:10px;padding:12px 16px;font-size:12px;color:#ffd700;word-break:break-all;font-family:monospace"></div>
  <div class="add-q-form">
    <input class="add-q-input" id="new-q-input" placeholder="Nouvelle question… (ex: Super-héros préférés)" onkeydown="if(event.key==='Enter')addQuestion()">
    <button class="btn btn-primary btn-sm" onclick="addQuestion()">+ Ajouter</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tsneytqibltnjarajcll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yxIJa12tOnd1UqEkdo7p_Q_7SwjwZH1';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let questions = [];
let currentQuestion = null;
let currentAnswers = []; // [{...answer, revealedBy: null|1|2}]
let scores = [0, 0];
let currentTeam = 1;
let spectatorWin = null;
let bc = null;
try { bc = new BroadcastChannel('panel_spectator'); } catch(e) {}

// ══ INIT ══
async function init() {
  await loadQuestions();
  document.getElementById('loading-overlay').classList.add('hidden');
  showView('selector');
}

async function loadQuestions() {
  const { data: qData, error: qErr } = await db.from('panel_questions').select('*').order('sort_order');
  if (qErr) { showToast('Erreur questions : ' + qErr.message); console.error(qErr); return; }
  const { data: aData, error: aErr } = await db.from('panel_answers').select('*').order('sort_order');
  if (aErr) { showToast('Erreur réponses : ' + aErr.message); console.error(aErr); return; }
  questions = (qData || []).map(q => ({
    ...q,
    panel_answers: (aData || []).filter(a => a.question_id === q.id).sort((a,b) => b.points - a.points)
  }));
  renderSelector();
  renderAdmin();
}

// ══ VIEWS ══
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

// ══ SELECTOR ══
function renderSelector() {
  const list = document.getElementById('questions-list');
  if (!questions.length) {
    list.innerHTML = '<div class="sel-empty">Aucune question — créez-en dans ⚙ Questions</div>';
    return;
  }
  list.innerHTML = questions.map((q, i) => `
    <div class="q-card" onclick="startGame(${q.id})">
      <div class="q-card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="q-card-text">${q.question}</div>
      <div class="q-card-count">${(q.panel_answers||[]).length} réponses</div>
      <div class="q-card-arrow">›</div>
    </div>
  `).join('');
}

// ══ GAME ══
function startGame(questionId) {
  currentQuestion = questions.find(q => q.id === questionId);
  if (!currentQuestion || !(currentQuestion.panel_answers||[]).length) {
    showToast('Cette question n\'a pas de réponses'); return;
  }
  const t1 = document.getElementById('team1-name').value.trim() || 'Équipe 1';
  const t2 = document.getElementById('team2-name').value.trim() || 'Équipe 2';
  scores = [0, 0];
  currentTeam = 1;
  currentAnswers = currentQuestion.panel_answers.map(a => ({...a, revealedBy: null}));

  // Update UI names
  ['t1','t2'].forEach((t,i) => {
    const name = i===0 ? t1 : t2;
    document.getElementById('name-'+t).textContent = name;
    document.getElementById('turn-'+t).textContent = name;
    document.getElementById('ctrl-name-'+t).textContent = name;
    document.getElementById('btn-nav-admin').style.display = 'none';
  });
  document.getElementById('score-t1').textContent = 0;
  document.getElementById('score-t2').textContent = 0;
  document.getElementById('game-q-text').textContent = currentQuestion.question;

  renderAnswers();
  updateTurnUI();
  showView('game');
  pushSpectator();
}

function renderAnswers() {
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = currentAnswers.map((a, i) => {
    const revealed = a.revealedBy !== null;
    const teamClass = revealed ? 'revealed-t'+a.revealedBy : '';
    const ptsClass = revealed ? 't'+a.revealedBy : 'neutral';
    return `<div class="answer-row ${teamClass}" id="ans-row-${i}" onclick="revealAnswer(${i})">
      <div class="ans-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="ans-text ${revealed?'':'hidden-text'}" id="ans-text-${i}">${a.answer}</div>
      <div class="ans-points ${ptsClass} ${revealed?'':'hidden-pts'}" id="ans-pts-${i}">${a.points}</div>
    </div>`;
  }).join('');
}

function revealAnswer(idx) {
  if (currentAnswers[idx].revealedBy !== null) return; // already revealed
  currentAnswers[idx].revealedBy = currentTeam;

  // Animate reveal
  const row = document.getElementById('ans-row-'+idx);
  const txt = document.getElementById('ans-text-'+idx);
  const pts = document.getElementById('ans-pts-'+idx);
  row.classList.add('revealed-t'+currentTeam);
  txt.classList.remove('hidden-text');
  pts.classList.remove('hidden-pts');
  pts.classList.remove('neutral');
  pts.classList.add('t'+currentTeam);

  // Auto-add points to current team
  scores[currentTeam-1] += currentAnswers[idx].points;
  updateScoreUI();
  showToast('✓ +' + currentAnswers[idx].points + ' pts');
  pushSpectator();
}

function givePoint(team) {
  scores[team-1]++;
  updateScoreUI();
  showToast('+1 → ' + document.getElementById('name-t'+team).textContent);
  pushSpectator();
}

function switchTurn() {
  currentTeam = currentTeam === 1 ? 2 : 1;
  updateTurnUI();
  pushSpectator();
}

function updateTurnUI() {
  const t1 = document.getElementById('turn-t1');
  const t2 = document.getElementById('turn-t2');
  if (currentTeam === 1) { t1.classList.remove('inactive'); t2.classList.add('inactive'); }
  else { t2.classList.remove('inactive'); t1.classList.add('inactive'); }
}

function updateScoreUI() {
  [1,2].forEach(t => {
    const el = document.getElementById('score-t'+t);
    el.textContent = scores[t-1];
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  });
}

function confirmBack() {
  if (confirm('Quitter la partie en cours ?')) {
    document.getElementById('btn-nav-admin').style.display = '';
    showView('selector');
    pushClearSpectator();
  }
}

// ══ SPECTATOR ══
function getSpectatorState() {
  return {
    question: currentQuestion ? currentQuestion.question : null,
    answers: currentAnswers,
    scores,
    team1Name: document.getElementById('name-t1')?.textContent || 'Équipe 1',
    team2Name: document.getElementById('name-t2')?.textContent || 'Équipe 2',
    currentTeam,
    active: true
  };
}

function pushSpectator() {
  const state = getSpectatorState();
  if (bc) try { bc.postMessage(state); } catch(e) {}
  try { localStorage.setItem('panel_spectator', JSON.stringify(state)); } catch(e) {}
  if (spectatorWin && !spectatorWin.closed && spectatorWin.applyPanelState) {
    try { spectatorWin.applyPanelState(state); } catch(e) {}
  }
}

function pushClearSpectator() {
  const state = { active: false };
  if (bc) try { bc.postMessage(state); } catch(e) {}
  try { localStorage.setItem('panel_spectator', JSON.stringify(state)); } catch(e) {}
}

function openSpectator() {
  pushSpectator();
  spectatorWin = window.open('', 'panel_spectator', 'width=1280,height=720,toolbar=0,menubar=0,location=0');
  if (!spectatorWin) { showToast('Pop-up bloquée'); return; }
  spectatorWin.document.write(buildSpectatorHTML());
  spectatorWin.document.close();
  showToast('Écran joueurs ouvert');
  setTimeout(() => pushSpectator(), 600);
  setTimeout(() => pushSpectator(), 1600);
}

function buildSpectatorHTML() {
  return `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Le Panel — Joueurs</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

.sp-turn-badge.t1{background:rgba(79,158,255,0.15);border:1px solid rgba(79,158,255,0.4);color:#4f9eff}

.sp-turn-badge.inactive{opacity:.25}
.sp-sep{color:rgba(255,255,255,0.15);font-size:11px}
.sp-board{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 80px}
.sp-grid{width:100%;max-width:800px;display:flex;flex-direction:column;gap:12px}
.sp-row{display:flex;align-items:center;gap:0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;min-height:68px;transition:all .4s cubic-bezier(.16,1,.3,1)}
.sp-row.revealed-t1{background:rgba(79,158,255,0.1);border-color:rgba(79,158,255,0.4)}

<div class="sp-top">

  </div>
  <div class="sp-q-center">
    <div class="sp-q-label">Question</div>
    <div class="sp-q-text" id="sp-q">En attente…</div>
  </div>
  <div class="sp-score-block t2">
    <div class="sp-score t2" id="sp-s2">0</div>
    <div class="sp-name t2" id="sp-n2">Équipe 2</div>
  </div>
</div>
<div class="sp-turn">
  <div class="sp-turn-badge t1" id="sp-turn-t1">Équipe 1</div>
  <div class="sp-sep">joue</div>
  <div class="sp-turn-badge t2 inactive" id="sp-turn-t2">Équipe 2</div>
</div>
<div class="sp-board" id="sp-board">
  <div class="sp-waiting">En attente du maître du jeu…</div>
</div>
<script>
let pScores=[0,0];
function applyPanelState(s){
  if(!s||!s.active){document.getElementById('sp-board').innerHTML='<div class="sp-waiting">En attente du maître du jeu…</div>';return;}
  document.getElementById('sp-q').textContent=s.question||'—';
  document.getElementById('sp-n1').textContent=s.team1Name||'Équipe 1';
  document.getElementById('sp-n2').textContent=s.team2Name||'Équipe 2';
  document.getElementById('sp-turn-t1').textContent=s.team1Name||'Équipe 1';
  document.getElementById('sp-turn-t2').textContent=s.team2Name||'Équipe 2';
  // Scores with bump
  [1,2].forEach(t=>{
    const el=document.getElementById('sp-s'+t);
    const v=s.scores[t-1]||0;
    if(v!==pScores[t-1]){el.textContent=v;el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');pScores[t-1]=v;}
    else{el.textContent=v;}
  });
  // Turn
  const tb1=document.getElementById('sp-turn-t1'),tb2=document.getElementById('sp-turn-t2');
  if(s.currentTeam===1){tb1.classList.remove('inactive');tb2.classList.add('inactive');}
  else{tb2.classList.remove('inactive');tb1.classList.add('inactive');}
  // Board
  if(!s.answers||!s.answers.length){document.getElementById('sp-board').innerHTML='<div class="sp-waiting">En attente…</div>';return;}
  const grid=s.answers.map((a,i)=>{
    const rev=a.revealedBy!==null;
    const tc=rev?'revealed-t'+a.revealedBy:'';
    const pc=rev?'t'+a.revealedBy:'neutral';
    return '<div class="sp-row '+tc+'"><div class="sp-rank">'+String(i+1).padStart(2,'0')+'</div><div class="sp-ans'+(rev?'':' hidden')+'">'+a.answer+'</div><div class="sp-pts '+pc+(rev?'':' hidden')+'">'+a.points+'</div></div>';
  }).join('');
  document.getElementById('sp-board').innerHTML='<div class="sp-grid">'+grid+'</div>';
}
try{const bc2=new BroadcastChannel('panel_spectator');bc2.onmessage=e=>applyPanelState(e.data);}catch(e){}
setInterval(()=>{try{const r=localStorage.getItem('panel_spectator');if(r)applyPanelState(JSON.parse(r));}catch(e){}},600);
try{applyPanelState(JSON.parse(localStorage.getItem('panel_spectator')));}catch(e){}
<\/script></body></html>`;
}

// ══ ADMIN ══
function renderAdmin() {
  const container = document.getElementById('admin-questions');
  if (!questions.length) {
    container.innerHTML = '<div class="sel-empty" style="padding:30px 0">Aucune question pour l\'instant.</div>';
    return;
  }
  container.innerHTML = questions.map(q => `
    <div class="admin-q-block" id="admin-q-${q.id}">
      <div class="admin-q-header">
        <div class="admin-q-text">${q.question}</div>
        <div class="admin-q-actions">
          <button class="btn btn-ghost btn-sm" onclick="addAnswer(${q.id})">+ Réponse</button>
          <button class="btn btn-sm" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171" onclick="deleteQuestion(${q.id})">✕</button>
        </div>
      </div>
      <div class="admin-answers-list" id="answers-${q.id}">
        ${(q.panel_answers||[]).map(a => `
          <div class="admin-ans-row" id="arow-${a.id}">
            <input class="admin-ans-text" value="${a.answer}" placeholder="Réponse…" onblur="updateAnswer(${a.id}, this.value, null)">
            <input class="admin-ans-pts" type="number" value="${a.points}" min="1" max="100" placeholder="pts" onblur="updateAnswer(${a.id}, null, this.value)">
            <button class="admin-ans-del" onclick="deleteAnswer(${a.id}, ${q.id})">✕</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function addQuestion() {
  const input = document.getElementById('new-q-input');
  const text = input.value.trim();
  if (!text) { showToast('Écris une question d'abord'); return; }
  const dbg = document.getElementById('debug-box');
  dbg.textContent = 'Envoi en cours…';
  dbg.style.display = 'block';
  const { data, error } = await db.from('panel_questions').insert({ question: text, sort_order: questions.length }).select();
  if (error) {
    dbg.textContent = 'ERREUR : ' + JSON.stringify(error);
    showToast('Erreur : ' + error.message);
    return;
  }
  dbg.textContent = 'OK : ' + JSON.stringify(data);
  input.value = '';
  await loadQuestions();
  showToast('Question ajoutée ✓');
  setTimeout(() => { dbg.style.display = 'none'; }, 4000);
}

async function deleteQuestion(id) {
  if (!confirm('Supprimer cette question et ses réponses ?')) return;
  await db.from('panel_questions').delete().eq('id', id);
  await loadQuestions();
  showToast('Question supprimée');
}

async function addAnswer(questionId) {
  const { error } = await db.from('panel_answers').insert({ question_id: questionId, answer: '', points: 10, sort_order: 0 });
  if (error) { showToast('Erreur : ' + error.message); return; }
  await loadQuestions();
}

async function updateAnswer(id, answer, points) {
  const payload = {};
  if (answer !== null) payload.answer = answer;
  if (points !== null) payload.points = parseInt(points) || 0;
  await db.from('panel_answers').update(payload).eq('id', id);
}

async function deleteAnswer(id, questionId) {
  await db.from('panel_answers').delete().eq('id', id);
  await loadQuestions();
}

// ══ UTILS ══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

init();
</script>
