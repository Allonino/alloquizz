<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Panel — Spectateur</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}

.sp-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px 48px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,.02)}
.sp-score-block{display:flex;align-items:center;gap:16px}
.sp-score-block.t2{flex-direction:row-reverse;justify-self:end}
.sp-score{font-family:'Exo 2',sans-serif;font-size:64px;font-weight:800;font-style:italic;line-height:1;font-variant-numeric:tabular-nums}
.sp-score.t1{color:var(--t1)}.sp-score.t2{color:var(--t2)}
.sp-score.bump{animation:aq-bump .3s ease-out}
.sp-name{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.06em}
.sp-name.t1{color:var(--t1)}.sp-name.t2{color:var(--t2)}
.sp-q-center{text-align:center}
.sp-q-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.sp-q-text{font-size:18px;font-weight:600;color:var(--text);max-width:400px;line-height:1.3}
.sp-turn{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0;flex-shrink:0}
.sp-turn-badge{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Exo 2',sans-serif;font-style:italic;transition:all .3s}
.sp-turn-badge.t1{background:var(--t1-bg);border:1px solid var(--t1-border);color:var(--t1)}
.sp-turn-badge.t2{background:var(--t2-bg);border:1px solid var(--t2-border);color:var(--t2)}
.sp-turn-badge.inactive{opacity:.25}
.sp-sep{color:var(--border3);font-size:11px}
.sp-board{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 80px}
.sp-grid{width:100%;max-width:800px;display:flex;flex-direction:column;gap:12px}
.sp-row{display:flex;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;overflow:hidden;min-height:68px;transition:all .4s cubic-bezier(.16,1,.3,1)}
.sp-row.revealed-t1{background:var(--t1-bg);border-color:var(--t1-border)}
.sp-row.revealed-t2{background:var(--t2-bg);border-color:var(--t2-border)}
.sp-row.revealed-t0{background:rgba(255,255,255,.04);border-color:var(--border2)}
.sp-rank{width:60px;text-align:center;font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;font-style:italic;color:rgba(255,255,255,.15);flex-shrink:0;transition:color .3s}
.sp-row.revealed-t1 .sp-rank{color:var(--t1)}
.sp-row.revealed-t2 .sp-rank{color:var(--t2)}
.sp-row.revealed-t0 .sp-rank{color:var(--border3)}
.sp-ans{flex:1;font-size:20px;font-weight:700;color:var(--text);padding:0 8px;transition:opacity .4s}
.sp-ans.hidden{opacity:0}
.sp-pts{width:80px;text-align:center;font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;font-style:italic;padding:0 14px;transition:opacity .4s}
.sp-pts.hidden{opacity:0}
.sp-pts.t1{color:var(--t1)}.sp-pts.t2{color:var(--t2)}.sp-pts.neutral{color:var(--border3)}
.sp-waiting{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3);font-size:18px;font-weight:600}

#sp-wrong-overlay{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .12s}
#sp-wrong-overlay.show{opacity:1}
.sp-wrong-bg{position:absolute;inset:0;background:rgba(180,20,20,.18);border:6px solid rgba(255,40,40,.35)}
.sp-wrong-x{font-size:260px;font-weight:900;color:rgba(255,50,50,.9);position:relative;z-index:1;font-family:'Exo 2',sans-serif;font-style:italic;text-shadow:0 0 80px rgba(255,0,0,.6);line-height:1}
</style>
</head>
<body>

<div id="sp-wrong-overlay">
  <div class="sp-wrong-bg"></div>
  <div class="sp-wrong-x">✗</div>
</div>

<div class="sp-top">
  <div class="sp-score-block">
    <div class="sp-score t1" id="sp-s1">0</div>
    <div class="sp-name t1" id="sp-n1">Équipe 1</div>
  </div>
  <div class="sp-q-center">
    <div class="sp-q-label">Question</div>
    <div class="sp-q-text" id="sp-q">En attente…</div>
  </div>
  <div class="sp-score-block t2">
    <div class="sp-score t2" id="sp-s2">0</div>
    <div class="sp-name t2" id="sp-n2">Équipe 2</div>
  </div>
</div>

<div class="sp-turn">
  <div class="sp-turn-badge t1" id="sp-turn-t1">Équipe 1</div>
  <div class="sp-sep">joue</div>
  <div class="sp-turn-badge t2 inactive" id="sp-turn-t2">Équipe 2</div>
</div>

<div class="sp-board" id="sp-board">
  <div class="sp-waiting">En attente du maître du jeu…</div>
</div>

<script>
let pScores = [0,0], spWrongTimer = null;

function applyPanelState(s) {
  if (!s || !s.active) {
    document.getElementById('sp-board').innerHTML = '<div class="sp-waiting">En attente du maître du jeu…</div>';
    return;
  }
  if (s.wrongFlash) {
    const ov = document.getElementById('sp-wrong-overlay');
    ov.classList.add('show');
    if (spWrongTimer) clearTimeout(spWrongTimer);
    spWrongTimer = setTimeout(() => ov.classList.remove('show'), 2000);
    return;
  }
  document.getElementById('sp-q').textContent = s.question || '—';
  document.getElementById('sp-n1').textContent = s.team1Name || 'Équipe 1';
  document.getElementById('sp-n2').textContent = s.team2Name || 'Équipe 2';
  document.getElementById('sp-turn-t1').textContent = s.team1Name || 'Équipe 1';
  document.getElementById('sp-turn-t2').textContent = s.team2Name || 'Équipe 2';
  [1,2].forEach(t => {
    const el = document.getElementById('sp-s'+t);
    const v = s.scores[t-1] || 0;
    if (v !== pScores[t-1]) { el.textContent=v; el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); pScores[t-1]=v; }
    else { el.textContent=v; }
  });
  const tb1 = document.getElementById('sp-turn-t1'), tb2 = document.getElementById('sp-turn-t2');
  if (s.currentTeam===1) { tb1.classList.remove('inactive'); tb2.classList.add('inactive'); }
  else { tb2.classList.remove('inactive'); tb1.classList.add('inactive'); }
  if (!s.answers?.length) { document.getElementById('sp-board').innerHTML='<div class="sp-waiting">En attente…</div>'; return; }
  document.getElementById('sp-board').innerHTML = '<div class="sp-grid">' +
    s.answers.map((a,i) => {
      const rev = a.revealedBy !== null;
      const tc = rev ? 'revealed-t'+a.revealedBy : '';
      const pc = rev ? (a.revealedBy===0?'neutral':'t'+a.revealedBy) : 'neutral';
      return `<div class="sp-row ${tc}">
        <div class="sp-rank">${String(i+1).padStart(2,'0')}</div>
        <div class="sp-ans${rev?'':' hidden'}">${a.answer}</div>
        <div class="sp-pts ${pc}${rev?'':' hidden'}">${a.points}</div>
      </div>`;
    }).join('') + '</div>';
}

// Écoute BroadcastChannel
try {
  const bc = new BroadcastChannel('aq_panel');
  bc.onmessage = e => applyPanelState(e.data);
} catch(e) {}

// Polling localStorage
let lastRaw = null;
setInterval(() => {
  try {
    const raw = localStorage.getItem('aq_panel');
    if (raw && raw !== lastRaw) { lastRaw = raw; applyPanelState(JSON.parse(raw)); }
  } catch(e) {}
}, 500);

try { applyPanelState(JSON.parse(localStorage.getItem('aq_panel'))); } catch(e) {}
</script>
</body>
</html>
