<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Mot Interdit — Spectateur</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,800;1,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#06060d;color:#f0f0f5;display:flex;flex-direction:column}
@keyframes bump{0%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes timerPulse{0%,100%{text-shadow:0 0 0 rgba(239,68,68,0)}50%{text-shadow:0 0 30px rgba(239,68,68,.6)}}
@keyframes slideWord{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes forbidden{0%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(10px)}45%{transform:translateX(-8px)}60%{transform:translateX(8px)}75%{transform:translateX(-4px)}90%{transform:translateX(4px)}100%{transform:translateX(0)}}

/* TOP */
.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px 48px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.logo{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2)}
.logo b{color:#c084fc}
.scores{display:flex;align-items:center;justify-content:center;gap:40px}
.score-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-lbl{font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.score-val{font-family:'Exo 2',sans-serif;font-size:60px;font-weight:800;font-style:italic;line-height:1;font-variant-numeric:tabular-nums}
.score-val.bump{animation:bump .35s ease-out}
.t1c{color:#4f9eff}.t2c{color:#ff6b9d}
.score-sep{font-size:24px;color:rgba(255,255,255,.1);align-self:center;margin-top:8px}
.timer-area{display:flex;justify-content:flex-end;align-items:center}
.timer-val{font-family:'Exo 2',sans-serif;font-size:60px;font-weight:800;font-style:italic;font-variant-numeric:tabular-nums;line-height:1}
.t-ok{color:#c084fc}.t-warn{color:#f59e0b}.t-urgent{color:#ef4444;animation:timerPulse 1s ease-in-out infinite}

/* MAIN */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 64px}

/* WAITING */
.waiting{display:flex;flex-direction:column;align-items:center;gap:20px;color:rgba(255,255,255,.15);font-size:18px;font-weight:600;animation:fadeIn .5s ease}
.waiting svg{opacity:.15}

/* TEAM TURN */
.team-turn{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.1em;padding:6px 20px;border-radius:20px;margin-bottom:8px;animation:fadeIn .4s ease}
.team-turn.t1{background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.3);color:#4f9eff}
.team-turn.t2{background:rgba(255,107,157,.12);border:1px solid rgba(255,107,157,.3);color:#ff6b9d}

/* WORD DISPLAY */
.word-display{display:flex;flex-direction:column;align-items:center;gap:28px;width:100%;max-width:700px;animation:slideWord .45s cubic-bezier(.16,1,.3,1) both}
.word-big{font-family:'Exo 2',sans-serif;font-size:96px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em;color:#f0f0f5;text-align:center;line-height:1}
.forbidden-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.forbidden-chip{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px 18px;text-align:center;font-family:'Exo 2',sans-serif;font-size:22px;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.04em;color:#fca5a5}
.forbidden-chip.shake{animation:forbidden .5s ease-in-out}
.hint-lbl{font-size:13px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.12em;font-weight:700}

/* NO WORD YET */
.no-word-state{display:flex;flex-direction:column;align-items:center;gap:16px;color:rgba(255,255,255,.12);font-size:16px;font-weight:600;animation:fadeIn .5s ease}
.no-word-state svg{opacity:.12}
</style>
</head>
<body>

<div class="top">
  <div class="logo">Le <b>Mot Interdit</b></div>
  <div class="scores">
    <div class="score-block">
      <div class="score-lbl" id="lbl-t1">Équipe 1</div>
      <div class="score-val t1c" id="sp-score1">0</div>
    </div>
    <div class="score-sep">–</div>
    <div class="score-block">
      <div class="score-lbl" id="lbl-t2">Équipe 2</div>
      <div class="score-val t2c" id="sp-score2">0</div>
    </div>
  </div>
  <div class="timer-area">
    <div class="timer-val t-ok" id="sp-timer">—</div>
  </div>
</div>

<div class="main" id="main-area">
  <div class="waiting">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    En attente du maître du jeu…
  </div>
</div>

<script>
let prevScores = [0, 0];
let prevWord = null;

function applyState(s) {
  if (!s || s.view === 'setup') {
    document.getElementById('main-area').innerHTML = `
      <div class="waiting">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        En attente du maître du jeu…
      </div>`;
    document.getElementById('sp-timer').textContent = '—';
    document.getElementById('sp-timer').className = 'timer-val t-ok';
    return;
  }

  // Scores
  const teamNames = s.teamNames || ['Équipe 1', 'Équipe 2'];
  document.getElementById('lbl-t1').textContent = teamNames[0];
  document.getElementById('lbl-t2').textContent = teamNames[1];
  const sc = s.scores || [0, 0];
  ['sp-score1', 'sp-score2'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (sc[i] !== prevScores[i]) {
      el.textContent = sc[i];
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    }
  });
  prevScores = [...sc];

  // Timer
  const te = document.getElementById('sp-timer');
  const t = s.timerRemaining;
  if (t != null && s.view === 'playing') {
    te.textContent = t;
    te.className = 'timer-val ' + (t > 20 ? 't-ok' : t > 10 ? 't-warn' : 't-urgent');
  } else {
    te.textContent = '—'; te.className = 'timer-val t-ok';
  }

  // Main content
  const currentTeam = s.currentTeam || 0;
  const teamClass = currentTeam === 0 ? 't1' : 't2';
  const teamName = teamNames[currentTeam];

  if (s.currentWord) {
    const w = s.currentWord;
    const isNew = !prevWord || prevWord.word !== w.word;
    prevWord = w;
    document.getElementById('main-area').innerHTML = `
      <div class="word-display">
        <div class="team-turn ${teamClass}">${teamName}</div>
        <div class="hint-lbl">Mot à faire deviner</div>
        <div class="word-big">${w.word}</div>
        <div class="hint-lbl">Mots interdits</div>
        <div class="forbidden-list">
          ${(w.forbidden || []).map(f => `<div class="forbidden-chip">🚫 ${f}</div>`).join('')}
        </div>
      </div>`;
  } else {
    prevWord = null;
    document.getElementById('main-area').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
        <div class="team-turn ${teamClass}">${teamName}</div>
        <div class="no-word-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          En attente du prochain mot…
        </div>
      </div>`;
  }
}

// BroadcastChannel
try {
  const bc = new BroadcastChannel('mi_spectator');
  bc.onmessage = e => applyState(e.data);
} catch(e) {}

// Polling localStorage
setInterval(() => {
  try {
    const raw = localStorage.getItem('mi_spectator');
    if (raw) applyState(JSON.parse(raw));
  } catch(e) {}
}, 500);

try { applyState(JSON.parse(localStorage.getItem('mi_spectator'))); } catch(e) {}
</script>
</body>
</html>
